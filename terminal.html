<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}

:root{
  --bg:#0d1117;--text:#c9d1d9;--green:#58a6ff;--blue:#79c0ff;--yellow:#f9c35b;
  --red:#f07178;--magenta:#d2a8ff;--cyan:#56d4dd;--dim:#484f58;--bright:#f0f6fc;
  --font:'Menlo','Monaco','Courier New',monospace;
}

body{
  background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;
  display:flex;flex-direction:column;padding:0;
}

.terminal{flex:1;display:flex;flex-direction:column;padding:14px 16px 16px;overflow:hidden}

#output{
  flex:1;overflow-y:auto;overflow-x:hidden;white-space:pre-wrap;
  word-break:break-all;line-height:1.55;scrollbar-width:thin;
  scrollbar-color:rgba(255,255,255,0.08) transparent;
}
#output::-webkit-scrollbar{width:6px}
#output::-webkit-scrollbar-track{background:transparent}
#output::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}

.input-row{display:flex;align-items:flex-start;line-height:1.55;min-height:22px;margin-top:4px}
.prompt{color:var(--green);white-space:nowrap;flex-shrink:0;user-select:none}
.prompt .at{color:var(--dim)}
.prompt .host{color:var(--cyan)}
.prompt .colon{color:var(--dim)}
.prompt .path{color:var(--blue)}
.prompt .dollar{color:var(--dim);margin-left:1px}
.input-gap{width:12px;flex-shrink:0}
#input{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--bright);font-family:var(--font);font-size:13px;
  caret-color:var(--green);padding:0;line-height:1.55;
}

.line{line-height:1.55}
.line.cmd{color:var(--text)}
.line.output{color:var(--bright)}
.line.error{color:var(--red)}
.line.success{color:#3fb950}
.line.info{color:var(--blue)}
.line.warn{color:var(--yellow)}
.line.dim{color:var(--dim)}
.line.cyan{color:var(--cyan)}
.line.yellow{color:var(--yellow)}
.line.magenta{color:var(--magenta)}
.line.green{color:var(--green)}

.tab-hint{
  position:fixed;bottom:56px;left:16px;right:16px;
  background:rgba(22,27,34,0.96);border:1px solid rgba(255,255,255,0.08);
  border-radius:8px;padding:6px 10px;display:none;z-index:100;
  backdrop-filter:blur(20px);max-height:180px;overflow-y:auto;
}
.tab-hint.show{display:block}
.tab-hint-item{padding:2px 6px;border-radius:3px;font-size:12px;color:var(--dim);display:inline-block;margin:1px 4px 1px 0}
.tab-hint-item.selected{background:rgba(88,166,255,0.2);color:var(--bright)}
</style>
</head>
<body>

<div class="terminal">
  <div id="output"></div>
  <div class="input-row">
    <span class="prompt" id="prompt"></span>
    <span class="input-gap"></span>
    <input id="input" autofocus spellcheck="false" autocomplete="off">
  </div>
</div>
<div class="tab-hint" id="tab-hint"></div>

<script>
const outputEl = document.getElementById('output');
const inputEl = document.getElementById('input');
const promptEl = document.getElementById('prompt');
const tabHint = document.getElementById('tab-hint');

// ═══════════════════════════════════════════════════════════════
// PARENT COMMUNICATION (open windows from terminal)
// ═══════════════════════════════════════════════════════════════
function openInParent(url, title, icon) {
  try {
    window.parent.postMessage({
      type: 'openWindow',
      url: url,
      title: title || 'App',
      icon: icon || './images/Terminal.png'
    }, '*');
    return true;
  } catch(e) {
    return false;
  }
}

// ═══════════════════════════════════════════════════════════════
// FILESYSTEM
// ═══════════════════════════════════════════════════════════════
function createDefaultFS() {
  const root = { name:'/', type:'dir', children:{}, mtime: Date.now() };
  function mkdir(p, n) { const d = { name:n, type:'dir', children:{}, parent:p, mtime:Date.now() }; p.children[n] = d; return d; }
  function touch(p, n, c='') { p.children[n] = { name:n, type:'file', content:c, parent:p, mtime:Date.now() }; }

  const home = mkdir(root, 'home');
  const user = mkdir(home, 'user');
  const desktop = mkdir(user, 'Desktop');
  const documents = mkdir(user, 'Documents');
  const downloads = mkdir(user, 'Downloads');
  const projects = mkdir(user, 'Projects');

  mkdir(root, 'usr'); mkdir(root, 'etc'); mkdir(root, 'tmp');
  mkdir(root, 'var'); mkdir(root, 'bin'); mkdir(root, 'opt');

  touch(desktop, 'readme.md', '# My Desktop\n\nWelcome to WebOS Terminal v3.0\nType `help` to get started.');
  touch(desktop, 'notes.txt', 'Meeting at 3pm\nFix the Safari bug\nDeploy to production');
  touch(documents, 'config.json', '{\n  "theme": "dark",\n  "font": "Menlo",\n  "size": 13\n}');
  touch(documents, 'todo.md', '# TODO\n- [x] Build terminal\n- [x] Add commands\n- [ ] Ship it');
  touch(user, '.bashrc', '# ~/.bashrc\nexport PATH=$PATH:/usr/local/bin\nalias ll="ls -la"');
  touch(projects, 'index.html', '<!DOCTYPE html>\n<html>\n<head><title>Hello</title></head>\n<body style="font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#111;color:#fff">\n<h1>Hello World!</h1>\n</body>\n</html>');

  return root;
}

let root, cwd, history, historyIndex, env, aliases, startTime;

function initState() {
  startTime = Date.now();
  history = []; historyIndex = 0;
  env = { HOME:'/home/user', USER:'user', SHELL:'/bin/bash', TERM:'xterm-256color', HOSTNAME:'macbook', EDITOR:'nano' };
  aliases = { 'll':'ls -la', 'la':'ls -a', 'cls':'clear', '..':'cd ..' };
  root = createDefaultFS();
  cwd = root.children.home.children.user;
}

function restoreState() {
  const saved = localStorage.getItem('term_v3');
  if (!saved) return false;
  try {
    const s = JSON.parse(saved);
    history = s.history || []; historyIndex = history.length;
    env = s.env || {}; aliases = s.aliases || {};
    startTime = s.startTime || Date.now();
    root = JSON.parse(s.fs);
    restoreParents(root, null);
    cwd = resolvePath(s.cwd) || root.children.home.children.user;
    return true;
  } catch(e) { return false; }
}

function restoreParents(n, p) {
  n.parent = p;
  if (n.children) for (let k in n.children) restoreParents(n.children[k], n);
}

function saveState() {
  localStorage.setItem('term_v3', JSON.stringify({
    history: history.slice(-500), env, aliases, startTime,
    cwd: pathOf(cwd),
    fs: JSON.stringify(root, (k,v) => k === 'parent' ? undefined : v)
  }));
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function pathOf(n) {
  if (!n || n === root) return '/';
  const p = []; let c = n;
  while (c && c !== root) { p.unshift(c.name); c = c.parent; }
  return '/' + p.join('/');
}

function shortPath(n) {
  let p = pathOf(n);
  if (p.startsWith('/home/user')) p = '~' + p.slice(10) || '~';
  return p;
}

function resolvePath(path) {
  if (!path) return cwd;
  path = path.replace(/^~/, '/home/user');
  if (!path.startsWith('/')) path = pathOf(cwd) + (pathOf(cwd) === '/' ? '' : '/') + path;
  const parts = path.split('/').filter(Boolean);
  const resolved = [];
  for (const p of parts) {
    if (p === '.') continue;
    if (p === '..') { resolved.pop(); continue; }
    resolved.push(p);
  }
  let node = root;
  for (const p of resolved) {
    if (!node?.children?.[p]) return null;
    node = node.children[p];
  }
  return node;
}

function find(name) {
  if (!name) return null;
  if (name.includes('/')) return resolvePath(name);
  return cwd.children?.[name] || null;
}

function updatePrompt() {
  promptEl.innerHTML = `<span class="path">${esc(shortPath(cwd))}</span><span class="dollar">❯</span>`;
}

function print(t, c='output') {
  t.split('\n').forEach(l => {
    const d = document.createElement('div');
    d.className = 'line ' + c; d.textContent = l;
    outputEl.appendChild(d);
  });
  outputEl.scrollTop = outputEl.scrollHeight;
}

function printH(h, c='output') {
  const d = document.createElement('div');
  d.className = 'line ' + c; d.innerHTML = h;
  outputEl.appendChild(d);
  outputEl.scrollTop = outputEl.scrollHeight;
}

function printCmd(cmd) {
  const d = document.createElement('div');
  d.className = 'line cmd';
  d.innerHTML = `<span class="prompt"><span class="path">${esc(shortPath(cwd))}</span><span class="dollar">❯</span></span> ${esc(cmd)}`;
  outputEl.appendChild(d);
  outputEl.scrollTop = outputEl.scrollHeight;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtSize(b) { return b < 1024 ? b+'B' : b < 1048576 ? (b/1024).toFixed(1)+'K' : (b/1048576).toFixed(1)+'M'; }
function fmtDate(ts) {
  if (!ts) return 'Jan  1 00:00';
  const d = new Date(ts), m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${m[d.getMonth()]} ${String(d.getDate()).padStart(2)} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fileSize(n) { return (n.content||'').length; }
function dirSize(n) { if (!n.children) return fileSize(n); let t=0; for(let k in n.children) t+=dirSize(n.children[k]); return t; }
function rand(a,b) { return Math.floor(Math.random()*(b-a+1))+a; }
function randHex(l) { let h=''; for(let i=0;i<l;i++) h+='0123456789abcdef'[rand(0,15)]; return h; }

// ═══════════════════════════════════════════════════════════════
// COMMANDS
// ═══════════════════════════════════════════════════════════════
const CMDS = {

  // ─── Navigation ───
  help: {
    desc: 'Show available commands', usage: 'help [command]',
    fn(a) {
      if (a[1] && CMDS[a[1]]) { print(`${a[1]} — ${CMDS[a[1]].desc}`, 'info'); print(`  ${CMDS[a[1]].usage}`, 'dim'); return; }
      print('');
      printH('  <span style="color:var(--cyan)">╔═══════════════════════════════════════════════╗</span>');
      printH('  <span style="color:var(--cyan)">║</span>  <span style="color:var(--bright);font-weight:bold">Terminal v3.0 — Command Reference</span>          <span style="color:var(--cyan)">║</span>');
      printH('  <span style="color:var(--cyan)">╚═══════════════════════════════════════════════╝</span>');
      print('');
      const cats = {
        '📁 Files': ['ls','cd','pwd','mkdir','touch','cat','rm','cp','mv','tree','find','du','head','tail','wc','grep','chmod'],
        '🖥  System': ['whoami','uname','date','uptime','df','free','ps','top','history'],
        '⚙️  Shell': ['env','export','echo','alias','clear','help','man','exit'],
        '🌐 Network': ['curl','ping','ifconfig','fetch'],
        '💻 Dev': ['git','node','python','run','serve','preview'],
        '🔢 Tools': ['base64','sha256','calc','uuid','color'],
        '🎮 Fun': ['cowsay','fortune','neofetch','weather','matrix','figlet','sl'],
      };
      for (let cat in cats) {
        printH(`  <span style="color:var(--yellow)">${cat}</span>`);
        const cmds = cats[cat];
        for (let i = 0; i < cmds.length; i += 5) {
          print('    ' + cmds.slice(i, i+5).map(c => c.padEnd(14)).join(''));
        }
        print('');
      }
      print('  Tab to autocomplete • ↑↓ for history • Ctrl+C cancel', 'dim');
      print('  ~ for home • .. for parent • > to redirect output', 'dim');
      print('  run <file> to preview HTML in a new window', 'dim');
      print('');
    }
  },
  clear: { desc: 'Clear screen', usage: 'clear', fn: () => outputEl.innerHTML = '' },
  exit: { desc: 'Close terminal', usage: 'exit', fn: () => print('logout', 'dim') },
  man: { desc: 'Manual page', usage: 'man <cmd>', fn(a) {
    if (!a[1]) { print('What manual page?', 'error'); return; }
    const c = CMDS[a[1]];
    if (!c) { print(`No manual for ${a[1]}`, 'error'); return; }
    print(`NAME`, 'yellow'); print(`    ${a[1]} — ${c.desc}`); print('');
    print(`SYNOPSIS`, 'yellow'); print(`    ${c.usage}`); print('');
  }},

  // ─── Filesystem ───
  ls: { desc: 'List files', usage: 'ls [-la] [path]', fn(a) {
    let all=false, lng=false, tgt=null;
    for(let i=1;i<a.length;i++) { if(a[i][0]==='-'){if(a[i].includes('a'))all=true;if(a[i].includes('l'))lng=true;} else tgt=a[i]; }
    let dir = tgt ? find(tgt) : cwd;
    if(!dir){print(`ls: ${tgt}: not found`,'error');return;}
    if(dir.type==='file'){print(dir.name);return;}
    let entries = Object.keys(dir.children||{}).filter(n=>all||!n[0]==='.').sort();
    if(all) entries = ['.','..',...entries];
    if(lng) {
      entries.forEach(n => {
        if(n==='.'||n==='..'){print(`drwxr-xr-x  2 user  staff   64B  ${fmtDate()}  ${n}`);return;}
        const nd = dir.children[n], d = nd.type==='dir';
        printH(`${d?'drwxr-xr-x':'-rw-r--r--'}  1 user  staff  ${fmtSize(d?64:fileSize(nd)).padStart(5)}  ${fmtDate(nd.mtime)}  <span class="${d?'info':''}">${esc(n)}${d?'/':''}</span>`);
      });
    } else {
      print(entries.map(n=>{if(n==='.'||n==='..')return n;const nd=dir.children[n];return n+(nd.type==='dir'?'/':'');}).join('  '));
    }
  }},
  cd: { desc: 'Change directory', usage: 'cd [path]', fn(a) {
    const t = a[1] || '~', n = resolvePath(t);
    if(!n){print(`cd: ${t}: not found`,'error');return;}
    if(n.type!=='dir'){print(`cd: ${t}: not a directory`,'error');return;}
    cwd = n; updatePrompt(); saveState();
  }},
  pwd: { desc: 'Print working directory', usage: 'pwd', fn: () => print(pathOf(cwd)) },
  mkdir: { desc: 'Make directory', usage: 'mkdir <name>', fn(a) {
    if(!a[1]){print('mkdir: missing name','error');return;}
    if(cwd.children[a[1]]){print('mkdir: already exists','error');return;}
    cwd.children[a[1]]={name:a[1],type:'dir',children:{},parent:cwd,mtime:Date.now()};saveState();
  }},
  touch: { desc: 'Create file', usage: 'touch <name>', fn(a) {
    if(!a[1]){print('touch: missing name','error');return;}
    if(!cwd.children[a[1]]) cwd.children[a[1]]={name:a[1],type:'file',content:'',parent:cwd,mtime:Date.now()};
    else cwd.children[a[1]].mtime=Date.now();
    saveState();
  }},
  cat: { desc: 'Show file contents', usage: 'cat <file>', fn(a) {
    if(!a[1]){print('cat: missing file','error');return;}
    const n=find(a[1]);
    if(!n){print(`cat: ${a[1]}: not found`,'error');return;}
    if(n.type==='dir'){print('cat: is a directory','error');return;}
    print(n.content||'(empty)');
  }},
  rm: { desc: 'Remove file/dir', usage: 'rm [-r] <path>', fn(a) {
    let rec=false, tgts=[];
    for(let i=1;i<a.length;i++){if(a[i].includes('r'))rec=true;else tgts.push(a[i]);}
    if(!tgts.length){print('rm: missing operand','error');return;}
    for(const t of tgts){const n=find(t);if(!n){print(`rm: ${t}: not found`,'error');continue;}
    if(n.type==='dir'&&!rec){print(`rm: ${t}: use -r`,'error');continue;}delete n.parent.children[n.name];}
    saveState();
  }},
  cp: { desc: 'Copy file', usage: 'cp <src> <dest>', fn(a) {
    if(a.length<3){print('cp: missing operand','error');return;}
    const src=find(a[1]);if(!src){print(`cp: ${a[1]}: not found`,'error');return;}
    if(src.type==='dir'){print('cp: omitting directory','error');return;}
    let dd=cwd, dn=a[2];const dn2=find(a[2]);if(dn2&&dn2.type==='dir'){dd=dn2;dn=src.name;}
    dd.children[dn]={name:dn,type:'file',content:src.content,parent:dd,mtime:Date.now()};saveState();
  }},
  mv: { desc: 'Move/rename', usage: 'mv <src> <dest>', fn(a) {
    if(a.length<3){print('mv: missing operand','error');return;}
    const src=find(a[1]);if(!src){print(`mv: ${a[1]}: not found`,'error');return;}
    const dest=find(a[2]);
    if(dest&&dest.type==='dir'){dest.children[src.name]=src;src.parent=dest;}
    else {let dd=cwd,dn=a[2];if(a[2].includes('/')){const p=a[2].split('/');dn=p.pop();dd=resolvePath(p.join('/'));if(!dd){print('mv: bad path','error');return;}}
    dd.children[dn]=src;src.name=dn;src.parent=dd;}
    // remove from old
    for(let k in root.children){} // force cleanup
    saveState();print(`Moved ${a[1]} → ${a[2]}`,'dim');
  }},
  tree: { desc: 'Directory tree', usage: 'tree [path]', fn(a) {
    const tgt = a[1]?find(a[1]):cwd;
    if(!tgt||tgt.type!=='dir'){print('tree: not a directory','error');return;}
    print(shortPath(tgt),'info');
    let count=0;
    function draw(nd,pre,last) {
      const ents=Object.keys(nd.children||{}).sort();
      ents.forEach((n,i)=>{
        const l=i===ents.length-1,c=l?'└── ':'├── ',ch=nd.children[n],d=ch.type==='dir';
        print(pre+c+n+(d?'/':''),d?'info':'output');count++;
        if(d)draw(ch,pre+(l?'    ':'│   '),l);
      });
    }
    draw(tgt,'',true);print(`\n${count} items`,'dim');
  }},
  find: { desc: 'Find files', usage: 'find <pattern>', fn(a) {
    if(!a[1]){print('find: missing pattern','error');return;}
    const pat=a[1].toLowerCase();const res=[];
    function s(n,p){if(n.name.toLowerCase().includes(pat))res.push(p+(n.type==='dir'?'/':''));
    if(n.children)for(let k in n.children)s(n.children[k],p+'/'+k);}
    s(cwd,'.');res.length?res.forEach(r=>print(r)):print('No matches','dim');
  }},
  du: { desc: 'Directory sizes', usage: 'du [path]', fn(a) {
    const t=a[1]?find(a[1]):cwd;if(!t){print('du: not found','error');return;}
    if(t.type==='file'){print(`${fmtSize(fileSize(t)).padStart(6)}  ${t.name}`);return;}
    for(let k in t.children){const n=t.children[k];print(`${fmtSize(dirSize(n)).padStart(6)}  ${k}${n.type==='dir'?'/':''}`);}
  }},
  head: { desc: 'First lines', usage: 'head [-n N] <file>', fn(a) {
    let n=10,f=null;for(let i=1;i<a.length;i++){if(a[i]==='-n'&&a[i+1])n=parseInt(a[++i])||10;else f=a[i];}
    if(!f){print('head: missing file','error');return;}const nd=find(f);if(!nd||nd.type!=='file'){print('head: not found','error');return;}
    (nd.content||'').split('\n').slice(0,n).forEach(l=>print(l));
  }},
  tail: { desc: 'Last lines', usage: 'tail [-n N] <file>', fn(a) {
    let n=10,f=null;for(let i=1;i<a.length;i++){if(a[i]==='-n'&&a[i+1])n=parseInt(a[++i])||10;else f=a[i];}
    if(!f){print('tail: missing file','error');return;}const nd=find(f);if(!nd||nd.type!=='file'){print('tail: not found','error');return;}
    (nd.content||'').split('\n').slice(-n).forEach(l=>print(l));
  }},
  wc: { desc: 'Word count', usage: 'wc <file>', fn(a) {
    if(!a[1]){print('wc: missing file','error');return;}const nd=find(a[1]);if(!nd||nd.type!=='file'){print('wc: not found','error');return;}
    const c=nd.content||'';print(`  ${c.split('\n').length}  ${c.split(/\s+/).filter(Boolean).length}  ${c.length} ${a[1]}`);
  }},
  grep: { desc: 'Search in file', usage: 'grep <pattern> <file>', fn(a) {
    if(a.length<3){print('Usage: grep <pattern> <file>','error');return;}
    const nd=find(a[2]);if(!nd||nd.type!=='file'){print('grep: not found','error');return;}
    let found=false;(nd.content||'').split('\n').forEach(l=>{
      if(l.toLowerCase().includes(a[1].toLowerCase())){
        printH(l.replace(new RegExp(a[1],'gi'),m=>`<span style="color:var(--red);font-weight:bold">${esc(m)}</span>`));found=true;}
    });if(!found)print('(no matches)','dim');
  }},
  chmod: { desc: 'Change permissions', usage: 'chmod <mode> <file>', fn(a) {
    if(a.length<3){print('Usage: chmod <mode> <file>','error');return;}
    const nd=find(a[2]);if(!nd){print('chmod: not found','error');return;}
    nd.mode=a[1];print(`mode of '${a[2]}' changed to ${a[1]}`,'dim');saveState();
  }},

  // ─── System ───
  whoami: { desc: 'Current user', usage: 'whoami', fn: () => print(env.USER) },
  uname: { desc: 'System info', usage: 'uname [-a]', fn(a) {
    a[1]==='-a'?print('WebOS macbook 26.0.0 Darwin Kernel 26.0.0 x86_64'):print('WebOS');
  }},
  date: { desc: 'Current date', usage: 'date', fn: () => print(new Date().toString()) },
  uptime: { desc: 'Uptime', usage: 'uptime', fn() {
    const e=Math.floor((Date.now()-startTime)/1000),h=Math.floor(e/3600),m=Math.floor((e%3600)/60);
    print(` ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}  up ${h}h ${m}m, 1 user, load: 1.42 1.38 1.29`);
  }},
  df: { desc: 'Disk usage', usage: 'df', fn() {
    const u=dirSize(root),t=512*1048576,p=Math.round(u/t*100);
    print('Filesystem     Size   Used  Avail  Use%  /');
    print(`/dev/disk0s1  ${fmtSize(t).padStart(5)}  ${fmtSize(u).padStart(5)}  ${fmtSize(t-u).padStart(5)}  ${String(p).padStart(3)}%  /`);
  }},

// ═══════════════════════════════════════════════════════════════
// COMMAND HANDLER
// ═══════════════════════════════════════════════════════════════
function handleCommand(cmdLine) {
  if (!cmdLine.trim()) return;
  printCmd(cmdLine.trim());

  let actual = cmdLine.trim();
  let redirect = null;
  if (actual.includes(' > ')) {
    const p = actual.split(' > ');
    actual = p[0]; redirect = p[1].trim();
  }

  const tokens = parseTokens(actual);
  let cmd = tokens[0], args = tokens;

  if (aliases[cmd]) {
    const expanded = parseTokens(aliases[cmd] + ' ' + args.slice(1).join(' '));
    cmd = expanded[0]; args = expanded;
  }

  if (CMDS[cmd]) {
    CMDS[cmd].fn(args);
  } else if (cmd) {
    print(`${cmd}: command not found. Type 'help'.`, 'error');
  }
}

function parseTokens(s) {
  const t=[];let c='',q=false,qc='';
  for(let i=0;i<s.length;i++){const ch=s[i];
    if(q){if(ch===qc)q=false;else c+=ch;}
    else if(ch==='"'||ch==="'"){q=true;qc=ch;}
    else if(ch===' '){if(c){t.push(c);c='';}}
    else c+=ch;
  }if(c)t.push(c);return t;
}

// ═══════════════════════════════════════════════════════════════
// INPUT HANDLING
// ═══════════════════════════════════════════════════════════════
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const cmd = inputEl.value;
    handleCommand(cmd);
    if (cmd.trim()) { history.push(cmd); historyIndex = history.length; saveState(); }
    inputEl.value = ''; hideTabHints(); return;
  }
  if (e.key === 'ArrowUp') { e.preventDefault(); if (historyIndex > 0) { historyIndex--; inputEl.value = history[historyIndex] || ''; } return; }
  if (e.key === 'ArrowDown') { e.preventDefault(); if (historyIndex < history.length) { historyIndex++; inputEl.value = history[historyIndex] || ''; } return; }
  if (e.key === 'Tab') { e.preventDefault(); handleTab(); return; }
  if (e.key === 'c' && e.ctrlKey) { e.preventDefault(); printCmd(inputEl.value + '^C'); inputEl.value = ''; return; }
  if (e.key === 'l' && e.ctrlKey) { e.preventDefault(); outputEl.innerHTML = ''; return; }
  hideTabHints();
});

function handleTab() {
  const val = inputEl.value, parts = val.split(' '), first = parts.length <= 1, last = parts[parts.length - 1] || '';
  if (first) {
    const m = Object.keys(CMDS).filter(c => c.startsWith(last));
    if (m.length === 1) inputEl.value = m[0] + ' ';
    else if (m.length > 1) { showHints(m); const p = commonPrefix(m); if (p.length > last.length) inputEl.value = p; }
  } else {
    const dir = last.includes('/') ? resolvePath(last.split('/').slice(0,-1).join('/')) || cwd : cwd;
    const prefix = last.includes('/') ? last.split('/').pop() : last;
    const dp = last.includes('/') ? last.split('/').slice(0,-1).join('/') + '/' : '';
    const m = Object.keys(dir.children||{}).filter(n => n.startsWith(prefix));
    if (m.length === 1) { const n = dir.children[m[0]]; parts[parts.length-1] = dp + m[0] + (n.type==='dir'?'/':' '); inputEl.value = parts.join(' '); }
    else if (m.length > 1) { showHints(m); const c = commonPrefix(m); if (c.length > prefix.length) { parts[parts.length-1] = dp + c; inputEl.value = parts.join(' '); } }
  }
}

function commonPrefix(s) { if (!s.length) return ''; let p = s[0]; for (let i = 1; i < s.length; i++) while (!s[i].startsWith(p)) p = p.slice(0,-1); return p; }

function showHints(items) {
  tabHint.innerHTML = items.map((it,i) => `<span class="tab-hint-item${i===0?' selected':''}">${esc(it)}</span>`).join('');
  tabHint.classList.add('show'); setTimeout(() => tabHint.classList.remove('show'), 3000);
}
function hideTabHints() { tabHint.classList.remove('show'); }

// ═══════════════════════════════════════════════════════════════
// WELCOME
// ═══════════════════════════════════════════════════════════════
function printWelcome() {
  print(`Last login: ${new Date().toLocaleString()}`,'dim');
  print('');
  printH('  <span style="color:var(--cyan)">╭────────────────────────────────────────╮</span>');
  printH('  <span style="color:var(--cyan)">│</span>  <span style="color:var(--bright);font-weight:bold">⚡ WebOS Terminal v3.0</span>                <span style="color:var(--cyan)">│</span>');
  printH('  <span style="color:var(--cyan)">│</span>  <span style="color:var(--dim)">Type help │ Tab autocomplete │ run .</span>  <span style="color:var(--cyan)">│</span>');
  printH('  <span style="color:var(--cyan)">╰────────────────────────────────────────╯</span>');
  print('');
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
if (!restoreState()) { initState(); printWelcome(); }
updatePrompt();
inputEl.focus();
document.addEventListener('click', () => inputEl.focus());
</script>
