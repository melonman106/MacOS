<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Developer Terminal</title>
<style>
body{margin:0;background:#0d0d0d;color:#00ff9c;font-family:monospace;display:flex;flex-direction:column;height:100vh;}
#terminal{flex:1;display:flex;flex-direction:column;padding:12px;}
#output{flex:1;overflow:auto;white-space:pre-wrap;}
.input-line{display:flex;}
.prompt{margin-right:6px;}
#input{flex:1;background:transparent;border:none;outline:none;color:#00ff9c;font-family:monospace;}
.header{background:#111;padding:8px;border-bottom:1px solid #222;font-size:13px;color:#aaa;}
</style>
</head>
<body>
<div class="header">Web Developer Terminal</div>
<div id="terminal">
<div id="output">Web Terminal Ready\nType "help"</div>
<div class="input-line">
<span class="prompt" id="prompt">user@web:/ $</span>
<input id="input" autofocus>
</div>
</div>

<script>
const output=document.getElementById("output");
const input=document.getElementById("input");
const prompt=document.getElementById("prompt");
let history=[],historyIndex=0;

let fs={name:"/",type:"dir",children:{}};
let cwd=fs;
let clonePending=null; // tracks if waiting for y/n to download

function pathOf(node){let path="";while(node&&node.name!=="/"){path="/"+node.name+path;node=node.parent;}return path||"/";}
function print(text){output.innerHTML+="\n"+text;output.scrollTop=output.scrollHeight;}
function updatePrompt(){prompt.textContent="user@web:"+pathOf(cwd)+" $";}
function find(name){return cwd.children[name];}

input.addEventListener("keydown",e=>{
if(e.key==="ArrowUp"){historyIndex=Math.max(0,historyIndex-1);input.value=history[historyIndex]||"";return;}
if(e.key==="ArrowDown"){historyIndex=Math.min(history.length,historyIndex+1);input.value=history[historyIndex]||"";return;}
if(e.key!=="Enter") return;

const cmd=input.value.trim();
history.push(cmd); historyIndex=history.length;
print(prompt.textContent+" "+cmd);

if(clonePending){
if(cmd.toLowerCase()==="y"){
window.open(clonePending.downloadUrl,"_blank");
print("Repository download started in new tab.");
}else{
print("Download skipped.");
}
clonePending=null;
input.value="";
return;
}

handle(cmd);
input.value="";
});

function handle(cmd){
const args=cmd.split(" ");
switch(args[0]){
case "help": print(`Commands
help
clear
ls
cd
pwd
tree
mkdir
touch
cat
rm
whoami
uname
curl
git clone <repo>
open <file.html>`); break;

case "clear": output.innerHTML="Web Terminal Ready\nType \"help\""; break;

case "pwd": print(pathOf(cwd)); break;

case "ls": print(Object.keys(cwd.children).join("  ")); break;

case "tree":
function draw(node,depth=0){for(let k in node.children){print(" ".repeat(depth*2)+k);if(node.children[k].type==="dir") draw(node.children[k],depth+1);}}
draw(cwd); break;

case "mkdir": if(!args[1]){print("missing name");break;} cwd.children[args[1]]={name:args[1],type:"dir",children:{},parent:cwd}; break;

case "touch": if(!args[1]){print("missing file");break;} cwd.children[args[1]]={name:args[1],type:"file",content:"",parent:cwd}; break;

case "cat": const f=find(args[1]); if(!f||f.type!=="file"){print("file not found");break;} print(f.content||"(empty file)"); break;

case "rm": delete cwd.children[args[1]]; break;

case "cd":
if(args[1]==="/"){cwd=fs;updatePrompt();break;}
if(args[1]===".."){if(cwd.parent) cwd=cwd.parent;updatePrompt();break;}
const dir=find(args[1]); if(!dir||dir.type!=="dir"){print("directory not found");break;} cwd=dir;updatePrompt(); break;

case "whoami": print("web-dev"); break;

case "uname": print("WebOS Kernel 1.0"); break;

case "curl": if(!args[1]){print("missing url");break;}
print("Fetching "+args[1]);
fetch(args[1]).then(r=>r.text()).then(t=>print(t.slice(0,500))).catch(()=>print("request failed")); break;

case "git":
if(args[1]==="clone"){
const repo=args[2]; if(!repo||!repo.includes("github.com")){print("Invalid repo URL");break;}
const parts=repo.replace("https://github.com/","").split("/"); const owner=parts[0]; const name=parts[1];
print("Cloning "+owner+"/"+name+" ...");

fetch(`https://api.github.com/repos/${owner}/${name}/contents`).then(r=>r.json()).then(data=>{
const repoDir={name:name,type:"dir",children:{},parent:cwd}; cwd.children[name]=repoDir;
data.forEach(item=>{
repoDir.children[item.name]={name:item.name,type:item.type==="dir"?"dir":"file",content:"",children:{},parent:repoDir};
});
print("Repository cloned into virtual filesystem.");
print("cd "+name+" to explore it.");
print("Do you want to download the repository as ZIP? (y/n)");

clonePending={downloadUrl:`https://github.com/${owner}/${name}/archive/refs/heads/main.zip`};
}).catch(()=>print("clone failed"));
} break;

case "open":
if(!args[1]){print("missing file"); break;}
const file=find(args[1]);
if(file && file.type==="file" && args[1].endsWith(".html")){
const blob=new Blob([file.content],{type:"text/html"}); const url=URL.createObjectURL(blob);
window.open(url,"_blank");
print("Opened "+args[1]+" in a new window.");
}else{print("file not found or not HTML");} break;

default: print("command not found"); break;
}

updatePrompt();
}

updatePrompt();
</script>
</body>
</html>
