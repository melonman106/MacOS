<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',-apple-system,sans-serif;background:#1c1c1e;color:#f5f5f7;display:flex}

/* ─── Sidebar ─── */
.sidebar{width:220px;background:rgba(44,44,46,0.8);border-right:1px solid rgba(255,255,255,0.06);overflow-y:auto;padding:8px 0;flex-shrink:0}
.sidebar::-webkit-scrollbar{width:0}
.sb-section{padding:4px 12px 4px 16px;font-size:11px;font-weight:600;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.6px;margin-top:8px}
.sb-item{display:flex;align-items:center;gap:10px;padding:6px 12px;margin:1px 8px;border-radius:7px;cursor:pointer;font-size:13px;color:rgba(255,255,255,0.8);transition:background 0.12s}
.sb-item:hover{background:rgba(255,255,255,0.06)}
.sb-item.active{background:rgba(0,122,255,0.35);color:#fff}
.sb-item .sb-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}

/* ─── Content ─── */
.content{flex:1;overflow-y:auto;padding:28px 36px}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}

.section-title{font-size:22px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px}
.section-desc{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:24px}

/* ─── Wallpaper ─── */
.wp-preview{width:100%;height:180px;border-radius:12px;background:#333;margin-bottom:20px;position:relative;overflow:hidden;border:2px solid rgba(255,255,255,0.08);cursor:pointer;transition:border-color 0.15s}
.wp-preview:hover{border-color:rgba(255,255,255,0.2)}
.wp-preview .wp-label{position:absolute;bottom:10px;left:12px;font-size:11px;font-weight:600;color:rgba(255,255,255,0.7);text-shadow:0 1px 4px rgba(0,0,0,0.5)}

.wp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.wp-option{height:90px;border-radius:10px;cursor:pointer;border:2px solid rgba(255,255,255,0.06);transition:all 0.15s;position:relative}
.wp-option:hover{border-color:rgba(255,255,255,0.2);transform:scale(1.03)}
.wp-option.active{border-color:#0071e3;box-shadow:0 0 0 2px rgba(0,113,227,0.4)}
.wp-option .check{position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:50%;background:#0071e3;display:none;align-items:center;justify-content:center;font-size:12px;color:#fff}
.wp-option.active .check{display:flex}

.wp-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.wp-row label{font-size:13px;color:rgba(255,255,255,0.6);width:80px;flex-shrink:0}
.wp-input{flex:1;padding:8px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:7px;color:#fff;font-size:13px;font-family:inherit;outline:none}
.wp-input:focus{border-color:#0071e3}
.wp-input::placeholder{color:rgba(255,255,255,0.25)}

.wp-btn{padding:9px 20px;border-radius:9px;border:none;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:background 0.15s}
.wp-btn-primary{background:#0071e3;color:#fff}
.wp-btn-primary:hover{background:#0077ed}
.wp-btn-secondary{background:rgba(255,255,255,0.08);color:#fff}
.wp-btn-secondary:hover{background:rgba(255,255,255,0.12)}
.wp-btn-danger{background:rgba(255,55,48,0.15);color:#ff453a}
.wp-btn-danger:hover{background:rgba(255,55,48,0.25)}

hr{border:none;border-top:1px solid rgba(255,255,255,0.06);margin:20px 0}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sb-item active" data-tab="wallpaper">
    <div class="sb-icon" style="background:linear-gradient(135deg,#667eea,#764ba2)">🎨</div>
    <span>Wallpaper</span>
  </div>
  <div class="sb-item" data-tab="appearance">
    <div class="sb-icon" style="background:linear-gradient(135deg,#f093fb,#f5576c)">🌓</div>
    <span>Appearance</span>
  </div>
  <div class="sb-item" data-tab="about">
    <div class="sb-icon" style="background:linear-gradient(135deg,#4facfe,#00f2fe)">ℹ️</div>
    <span>About</span>
  </div>
</div>

<div class="content" id="content-area">
  <!-- Content loaded dynamically -->
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// WALLPAPER OPTIONS
// ═══════════════════════════════════════════════════════════════
var WALLPAPERS = [
  { name: 'Default macOS', bg: "url('Macbg.jpg') center/cover no-repeat", preview: "url('Macbg.jpg') center/cover no-repeat" },
  { name: 'Sequoia Light', bg: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)", preview: "linear-gradient(135deg, #667eea, #764ba2)" },
  { name: 'Sonoma Sunset', bg: "linear-gradient(135deg, #f093fb 0%, #f5576c 100%)", preview: "linear-gradient(135deg, #f093fb, #f5576c)" },
  { name: 'Pacific Blue', bg: "linear-gradient(135deg, #0c3483 0%, #a2b6df 100%)", preview: "linear-gradient(135deg, #0c3483, #a2b6df)" },
  { name: 'Forest', bg: "linear-gradient(135deg, #0f4c3a 0%, #1a6b4f 50%, #2d8f6a 100%)", preview: "linear-gradient(135deg, #0f4c3a, #2d8f6a)" },
  { name: 'Midnight', bg: "linear-gradient(135deg, #0d0d1a 0%, #1a1a2e 50%, #16213e 100%)", preview: "linear-gradient(135deg, #0d0d1a, #16213e)" },
  { name: 'Warm Sand', bg: "linear-gradient(135deg, #f5d0a9 0%, #f7e2c5 50%, #e8c99b 100%)", preview: "linear-gradient(135deg, #f5d0a9, #e8c99b)" },
  { name: 'Deep Ocean', bg: "linear-gradient(135deg, #0d2137 0%, #0a3d62 50%, #1e5f8b 100%)", preview: "linear-gradient(135deg, #0d2137, #1e5f8b)" },
  { name: 'Rose Gold', bg: "linear-gradient(135deg, #e8b4b8 0%, #eed6d3 50%, #f0e0d6 100%)", preview: "linear-gradient(135deg, #e8b4b8, #f0e0d6)" },
  { name: 'Aurora', bg: "linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%)", preview: "linear-gradient(135deg, #0f2027, #2c5364)" },
  { name: 'Cosmic Purple', bg: "linear-gradient(135deg, #1a0533 0%, #2d1b69 50%, #44318d 100%)", preview: "linear-gradient(135deg, #1a0533, #44318d)" },
  { name: 'Dark', bg: "#1c1c1e", preview: "#1c1c1e" },
  { name: 'Charcoal', bg: "#2d2d2d", preview: "#2d2d2d" },
  { name: 'Pure Black', bg: "#000000", preview: "#000000" },
];

// ═══════════════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════════════
function load(key, fallback) {
  try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch(e) { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

var currentWallpaper = load('wallpaper', WALLPAPERS[0].bg);

// ═══════════════════════════════════════════════════════════════
// SEND MESSAGE TO PARENT
// ═══════════════════════════════════════════════════════════════
function sendWallpaper(bg) {
  currentWallpaper = bg;
  // Save locally
  save('wallpaper', bg);
  // Send to parent (index.html)
  try {
    window.parent.postMessage({ type: 'setWallpaper', wallpaper: bg }, '*');
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════
// SIDEBAR NAVIGATION
// ═══════════════════════════════════════════════════════════════
document.querySelectorAll('.sb-item').forEach(function(item) {
  item.addEventListener('click', function() {
    document.querySelectorAll('.sb-item').forEach(function(i) { i.classList.remove('active'); });
    item.classList.add('active');
    renderTab(item.dataset.tab);
  });
});

function renderTab(tab) {
  var area = document.getElementById('content-area');
  if (tab === 'wallpaper') renderWallpaper(area);
  else if (tab === 'appearance') renderAppearance(area);
  else if (tab === 'about') renderAbout(area);
}

// ═══════════════════════════════════════════════════════════════
// WALLPAPER TAB
// ═══════════════════════════════════════════════════════════════
function renderWallpaper(area) {
  area.innerHTML =
    '<div class="section-title">Wallpaper</div>' +
    '<div class="section-desc">Choose a wallpaper for your desktop</div>' +

    // Preview
    '<div class="wp-preview" id="wp-preview">' +
      '<div class="wp-label" id="wp-preview-label">Current</div>' +
    '</div>' +

    // Preset wallpapers
    '<div class="wp-grid" id="wp-grid"></div>' +

    '<hr>' +

    // Custom URL
    '<div class="section-title" style="font-size:16px;margin-bottom:12px">Custom Image</div>' +
    '<div class="wp-row">' +
      '<label>Image URL</label>' +
      '<input type="text" class="wp-input" id="custom-url" placeholder="https://example.com/image.jpg">' +
      '<button class="wp-btn wp-btn-primary" onclick="applyCustomUrl()">Apply</button>' +
    '</div>' +

    '<hr>' +

    // Upload
    '<div class="section-title" style="font-size:16px;margin-bottom:12px">Upload Image</div>' +
    '<div class="wp-row">' +
      '<input type="file" id="file-input" accept="image/*" style="display:none">' +
      '<button class="wp-btn wp-btn-secondary" onclick="document.getElementById(\'file-input\').click()">Choose File...</button>' +
      '<span style="font-size:12px;color:rgba(255,255,255,0.3)" id="file-name">No file chosen</span>' +
    '</div>' +

    '<hr>' +

    // Reset
    '<button class="wp-btn wp-btn-danger" onclick="resetWallpaper()">Reset to Default</button>';

  // Build grid
  var grid = document.getElementById('wp-grid');
  WALLPAPERS.forEach(function(wp, i) {
    var opt = document.createElement('div');
    opt.className = 'wp-option' + (currentWallpaper === wp.bg ? ' active' : '');
    opt.style.background = wp.preview;
    opt.title = wp.name;
    opt.innerHTML = '<div class="check">✓</div>';
    opt.addEventListener('click', function() {
      setWallpaper(wp.bg, wp.name);
      document.querySelectorAll('.wp-option').forEach(function(o) { o.classList.remove('active'); });
      opt.classList.add('active');
    });
    grid.appendChild(opt);
  });

  // Update preview
  updatePreview();

  // File input handler
  document.getElementById('file-input').addEventListener('change', handleFileUpload);
}

function setWallpaper(bg, name) {
  sendWallpaper(bg);
  updatePreview();
  if (name) document.getElementById('wp-preview-label').textContent = name;
}

function updatePreview() {
  var preview = document.getElementById('wp-preview');
  if (preview) preview.style.background = currentWallpaper;
}

function applyCustomUrl() {
  var url = document.getElementById('custom-url').value.trim();
  if (!url) return;
  var bg = "url('" + url + "') center/cover no-repeat";
  setWallpaper(bg, 'Custom');
  document.querySelectorAll('.wp-option').forEach(function(o) { o.classList.remove('active'); });
}

function handleFileUpload(e) {
  var file = e.target.files[0];
  if (!file) return;
  document.getElementById('file-name').textContent = file.name;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var bg = "url('" + ev.target.result + "') center/cover no-repeat";
    setWallpaper(bg, file.name);
    document.querySelectorAll('.wp-option').forEach(function(o) { o.classList.remove('active'); });
  };
  reader.readAsDataURL(file);
}

function resetWallpaper() {
  setWallpaper(WALLPAPERS[0].bg, WALLPAPERS[0].name);
  document.querySelectorAll('.wp-option').forEach(function(o, i) { o.classList.toggle('active', i === 0); });
}

// ═══════════════════════════════════════════════════════════════
// APPEARANCE TAB
// ═══════════════════════════════════════════════════════════════
function renderAppearance(area) {
  area.innerHTML =
    '<div class="section-title">Appearance</div>' +
    '<div class="section-desc">Customize how your desktop looks</div>' +
    '<div style="padding:40px;text-align:center;color:rgba(255,255,255,0.3);font-size:14px">' +
      'More appearance options coming soon...' +
    '</div>';
}

// ═══════════════════════════════════════════════════════════════
// ABOUT TAB
// ═══════════════════════════════════════════════════════════════
function renderAbout(area) {
  area.innerHTML =
    '<div class="section-title">About</div>' +
    '<div class="section-desc">System information</div>' +
    '<div style="text-align:center;padding:20px">' +
      '<div style="font-size:48px;margin-bottom:16px">🖥️</div>' +
      '<div style="font-size:18px;font-weight:600;margin-bottom:8px">macOS</div>' +
      '<div style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:4px">Version WebOS 26.0</div>' +
      '<div style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:20px">Built with ❤️</div>' +
      '<div style="background:rgba(255,255,255,0.05);border-radius:10px;padding:16px;text-align:left;max-width:400px;margin:0 auto">' +
        '<div style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:8px">System Specs</div>' +
        '<div style="font-size:13px;line-height:2">' +
          '<div>Processor: Virtual CPU</div>' +
          '<div>Memory: 16 GB</div>' +
          '<div>Graphics: Virtual GPU</div>' +
          '<div>Serial: N/A</div>' +
        '</div>' +
      '</div>' +
    '</div>';
}

// ═══════════════════════════════════════════════════════════════
// INIT — show wallpaper tab
// ═══════════════════════════════════════════════════════════════
renderTab('wallpaper');
</script>
</body>
</html>
