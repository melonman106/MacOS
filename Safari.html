<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safari</title>
<link rel="icon" href="./apple.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- X-Frame-Bypass Polyfill -->
<script src="https://unpkg.com/@ungap/custom-elements-builtin"></script>
<script type="module" src="https://unpkg.com/x-frame-bypass"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif}

:root{
  --bg:#1c1c1e;--surface:#2c2c2e;--surface2:#3a3a3c;
  --url-bg:rgba(255,255,255,0.07);--url-focus:rgba(255,255,255,0.12);
  --text:#f5f5f7;--text-dim:rgba(255,255,255,0.4);--text-mid:rgba(255,255,255,0.65);
  --accent:#0071e3;--accent-hover:#3395ff;
  --border:rgba(255,255,255,0.08);--hover:rgba(255,255,255,0.06);
  --card:rgba(255,255,255,0.05);--card-border:rgba(255,255,255,0.06);
}

body{background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* ─── Toolbar ─── */
.toolbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
}
.toolbar-row{display:flex;align-items:center;height:40px;padding:0 6px;gap:4px}

.btn{
  width:28px;height:28px;border-radius:6px;border:none;background:transparent;
  color:var(--text-mid);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background 0.12s,color 0.12s;flex-shrink:0;
}
.btn:hover{background:var(--hover);color:var(--text)}
.btn:active{background:rgba(255,255,255,0.1)}
.btn:disabled{opacity:0.25;cursor:default;pointer-events:none}
.btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.url-wrap{flex:1;display:flex;align-items:center;position:relative}
.url-input{
  width:100%;height:30px;border-radius:8px;
  background:var(--url-bg);border:1px solid transparent;
  padding:0 10px 0 28px;color:var(--text);font-size:12.5px;
  font-family:inherit;outline:none;text-align:center;
  transition:background 0.15s,border-color 0.2s;
}
.url-input:focus{background:var(--url-focus);border-color:var(--accent);text-align:left;padding-right:28px}
.url-input::placeholder{color:var(--text-dim)}
.url-lock{
  position:absolute;left:8px;top:50%;transform:translateY(-50%);
  width:12px;height:12px;fill:var(--text-dim);pointer-events:none;
  transition:opacity 0.15s;
}
.url-input:focus~.url-lock{opacity:0}
.url-go{
  position:absolute;right:4px;top:50%;transform:translateY(-50%);
  width:24px;height:24px;border:none;background:transparent;color:var(--accent);
  cursor:pointer;display:none;align-items:center;justify-content:center;border-radius:4px;
}
.url-input:focus~.url-go{display:flex}
.url-go:hover{background:rgba(0,113,227,0.15)}
.url-go svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}

/* ─── Tabs ─── */
.tabs-row{display:flex;align-items:flex-end;height:32px;padding:0 6px;gap:1px;overflow-x:auto}
.tabs-row::-webkit-scrollbar{display:none}

.tab{
  display:flex;align-items:center;gap:5px;
  min-width:120px;max-width:200px;height:28px;
  padding:0 8px;border-radius:7px 7px 0 0;
  background:transparent;cursor:pointer;flex-shrink:0;
  border:1px solid transparent;border-bottom:none;
  transition:background 0.12s;
}
.tab:hover{background:var(--hover)}
.tab.active{background:var(--surface);border-color:var(--border)}
.tab-fav{width:14px;height:14px;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;overflow:hidden}
.tab-fav img{width:14px;height:14px;border-radius:3px}
.tab-name{flex:1;font-size:11.5px;color:var(--text-mid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tab.active .tab-name{color:var(--text)}
.tab-x{
  width:16px;height:16px;border-radius:4px;border:none;background:transparent;
  color:var(--text-dim);cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.1s,background 0.1s;flex-shrink:0;
}
.tab:hover .tab-x{opacity:1}
.tab-x:hover{background:rgba(255,255,255,0.12);color:var(--text)}

.btn-new-tab{
  width:26px;height:24px;border-radius:6px;border:none;background:transparent;
  color:var(--text-dim);cursor:pointer;font-size:16px;flex-shrink:0;margin-bottom:2px;
  display:flex;align-items:center;justify-content:center;
}
.btn-new-tab:hover{background:var(--hover);color:var(--text)}

/* ─── Content ─── */
.content{flex:1;overflow:hidden;position:relative}
.content iframe{width:100%;height:100%;border:none;display:block;background:#fff}

.loading{
  position:absolute;top:0;left:0;height:3px;
  background:var(--accent);z-index:50;
  transition:width 0.4s ease;border-radius:0 2px 2px 0;
  box-shadow:0 0 10px rgba(0,113,227,0.4);pointer-events:none;
}
.loading.hidden{opacity:0}

/* ─── Start Page ─── */
.start-page{
  position:absolute;inset:0;overflow-y:auto;background:var(--bg);
  padding:48px 40px;display:flex;flex-direction:column;align-items:center;
}
.start-page::-webkit-scrollbar{width:5px}
.start-page::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}
.start-page.hidden{display:none}

.sp-greeting{font-size:34px;font-weight:700;letter-spacing:-1.5px;margin-bottom:6px}
.sp-sub{font-size:14px;color:var(--text-dim);margin-bottom:36px}

.section{width:100%;max-width:760px;margin-bottom:36px}
.section-head{
  font-size:12px;font-weight:600;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;
}
.section-head button{
  background:transparent;border:none;color:var(--accent);font-size:12px;
  cursor:pointer;font-family:inherit;
}
.section-head button:hover{text-decoration:underline}

.fav-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:14px}
.fav-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.fav-icon{
  width:52px;height:52px;border-radius:12px;background:var(--card);
  border:1px solid var(--card-border);display:flex;align-items:center;justify-content:center;
  font-size:22px;transition:transform 0.15s,background 0.15s;overflow:hidden;
}
.fav-item:hover .fav-icon{transform:scale(1.06);background:rgba(255,255,255,0.08)}
.fav-icon img{width:100%;height:100%;object-fit:cover}
.fav-label{font-size:11px;color:var(--text-mid);text-align:center;max-width:76px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.hist-list{display:flex;flex-direction:column;gap:2px}
.hist-item{
  display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;
  cursor:pointer;transition:background 0.12s;
}
.hist-item:hover{background:var(--hover)}
.hist-icon{
  width:30px;height:30px;border-radius:7px;background:var(--card);
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;
}
.hist-info{flex:1;min-width:0}
.hist-title{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-url{font-size:11px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-time{font-size:10px;color:var(--text-dim);flex-shrink:0}
.hist-rm{
  width:20px;height:20px;border:none;background:transparent;color:var(--text-dim);
  cursor:pointer;border-radius:4px;font-size:13px;
  display:flex;align-items:center;justify-content:center;opacity:0;flex-shrink:0;
}
.hist-item:hover .hist-rm{opacity:1}
.hist-rm:hover{background:rgba(255,55,48,0.2);color:#ff3750}

/* ─── Blocked Page ─── */
.blocked{
  position:absolute;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px;text-align:center;z-index:40;
}
.blocked.hidden{display:none}
.blocked-icon{font-size:48px;margin-bottom:16px}
.blocked-title{font-size:18px;font-weight:700;margin-bottom:4px}
.blocked-url{font-size:12px;color:var(--text-dim);margin-bottom:16px;word-break:break-all;max-width:480px}
.blocked-desc{font-size:13px;color:var(--text-mid);max-width:420px;line-height:1.6;margin-bottom:24px}
.blocked-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.bbtn{
  padding:9px 20px;border-radius:9px;border:none;font-size:13px;font-weight:600;
  font-family:inherit;cursor:pointer;transition:background 0.15s,transform 0.08s;
}
.bbtn:active{transform:scale(0.97)}
.bbtn-primary{background:var(--accent);color:#fff}
.bbtn-primary:hover{background:var(--accent-hover)}
.bbtn-secondary{background:var(--card);color:var(--text);border:1px solid var(--card-border)!important}
.bbtn-secondary:hover{background:rgba(255,255,255,0.08)}
.blocked-tip{margin-top:20px;padding:10px 16px;background:rgba(0,113,227,0.08);border:1px solid rgba(0,113,227,0.15);border-radius:8px;font-size:11px;color:var(--accent);line-height:1.5;max-width:420px}

/* ─── Modal ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--surface);border-radius:14px;padding:22px;width:360px;max-width:92vw;border:1px solid var(--border)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:14px}
.modal input{
  width:100%;padding:9px 12px;background:var(--url-bg);border:1px solid var(--border);
  border-radius:7px;color:var(--text);font-size:13px;font-family:inherit;outline:none;margin-bottom:10px;
}
.modal input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}

/* ─── Share Menu ─── */
.share-menu{
  position:fixed;background:rgba(44,44,46,0.95);
  backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);
  border-radius:10px;padding:6px;min-width:180px;
  box-shadow:0 12px 40px rgba(0,0,0,0.5),0 0 0 0.5px rgba(255,255,255,0.1);
  z-index:300;display:none;
}
.share-menu.show{display:block}
.share-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12.5px;transition:background 0.1s}
.share-item:hover{background:var(--accent)}
.share-item .si{width:18px;text-align:center;font-size:13px}

/* ─── Toast ─── */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);
  background:rgba(30,30,30,0.9);border:1px solid var(--border);color:var(--text);
  padding:8px 20px;border-radius:20px;font-size:12px;font-weight:500;
  backdrop-filter:blur(20px);z-index:999;opacity:0;transition:all 0.25s ease;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.section{animation:fadeIn 0.3s ease forwards}
.section:nth-child(2){animation-delay:0.04s}
.section:nth-child(3){animation-delay:0.08s}
.section:nth-child(4){animation-delay:0.12s}

/* ─── Status Bar ─── */
.status-bar{
  position:fixed;bottom:0;left:0;right:0;height:24px;
  background:rgba(30,30,32,0.95);backdrop-filter:blur(10px);
  display:flex;align-items:center;padding:0 16px;gap:12px;
  font-size:11px;color:var(--text-mid);z-index:50;
  border-top:1px solid rgba(255,255,255,0.08);
}
.status-item{display:flex;align-items:center;gap:4px}
.status-dot{width:6px;height:6px;border-radius:50%}
.status-dot.loading{background:#febc2e;animation:pulse 1.5s infinite}
.status-dot.success{background:#28c840}
.status-dot.error{background:#ff5f57}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ─── X-Frame-Bypass Status ─── */
.xfb-status{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(40,40,42,0.95);backdrop-filter:blur(40px);
  border-radius:12px;padding:24px 32px;text-align:center;
  z-index:60;display:none;max-width:400px;width:90%;
}
.xfb-status.show{display:block}
.xfb-title{font-size:18px;font-weight:600;margin-bottom:12px}
.xfb-desc{font-size:13px;color:var(--text-mid);margin-bottom:20px;line-height:1.5}
.xfb-progress{
  width:100%;height:4px;background:rgba(255,255,255,0.1);
  border-radius:2px;overflow:hidden;margin-bottom:16px;
}
.xfb-progress-bar{
  height:100%;background:var(--accent);width:0%;
  transition:width 0.3s ease;
}
.xfb-proxy{font-size:11px;color:var(--text-dim);margin-bottom:16px}
</style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <div class="toolbar-row">
    <button class="btn" id="btn-back" disabled title="Back"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
    <button class="btn" id="btn-fwd" disabled title="Forward"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button>
    <button class="btn" id="btn-refresh" title="Reload"><svg viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg></button>
    <div class="url-wrap">
      <svg class="url-lock" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      <input type="text" class="url-input" id="url-input" placeholder="Search or enter website name" spellcheck="false" autocomplete="off">
      <button class="url-go" id="url-go"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
    </div>
    <button class="btn" id="btn-share" title="Share"><svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg></button>
    <button class="btn" id="btn-tabs" title="Tab Overview"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></button>
  </div>
  <div class="tabs-row" id="tabs-row">
    <button class="btn-new-tab" id="btn-new-tab" title="New Tab">+</button>
  </div>
</div>

<!-- Content -->
<div class="content" id="content">
  <div class="loading hidden" id="loading"></div>
  <div class="blocked hidden" id="blocked"></div>
  <div class="start-page" id="start-page"></div>
</div>

<!-- Status Bar -->
<div class="status-bar">
  <div class="status-item">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Ready</span>
  </div>
  <div class="status-item" id="xfb-status" style="display:none">
    <span>🛡️ X-Frame-Bypass</span>
  </div>
  <div class="status-item" style="margin-left:auto">
    <span id="tab-count">1 tab</span>
  </div>
</div>

<!-- X-Frame-Bypass Status Modal -->
<div class="xfb-status" id="xfb-modal">
  <div class="xfb-title">🛡️ Bypassing X-Frame-Options</div>
  <div class="xfb-desc">This website doesn't allow embedding. Using X-Frame-Bypass to load it via CORS proxies...</div>
  <div class="xfb-progress">
    <div class="xfb-progress-bar" id="xfb-progress"></div>
  </div>
  <div class="xfb-proxy" id="xfb-proxy">Trying proxy 1 of 5...</div>
</div>

<!-- Share Menu -->
<div class="share-menu" id="share-menu">
  <div class="share-item" onclick="doShare('copy')"><span class="si">📋</span>Copy Link</div>
  <div class="share-item" onclick="doShare('newtab')"><span class="si">📑</span>Open in New Tab</div>
  <div class="share-item" onclick="doShare('fav')"><span class="si">⭐</span>Add to Favorites</div>
  <div class="share-item" onclick="doShare('read')"><span class="si">📖</span>Reading List</div>
  <div class="share-item" onclick="doShare('open')"><span class="si">↗️</span>Open in New Window</div>
</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modal">
  <div class="modal">
    <h3 id="modal-title">Add Bookmark</h3>
    <input type="text" id="modal-name" placeholder="Name">
    <input type="text" id="modal-url" placeholder="URL">
    <div class="modal-btns">
      <button class="bbtn bbtn-secondary" onclick="closeModal()">Cancel</button>
      <button class="bbtn bbtn-primary" id="modal-save" onclick="saveModal()">Add</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// X-FRAME-BYPASS INTEGRATION
// ═══════════════════════════════════════════════════════════════
const XFRAME_BYPASS_ENABLED = true;
const XFRAME_BYPASS_PROXIES = [
  'https://cors-anywhere.herokuapp.com/',
  'https://thingproxy.freeboard.io/fetch/',
  'https://yacdn.org/proxy/',
  'https://api.allorigins.win/raw?url=',
  'https://corsproxy.io/?'
];

// Sites that work in iframes (no bypass needed)
const EMBED_OK = [
  'wikipedia.org', 'wikimedia.org', 'en.wikipedia.org',
  'duckduckgo.com', 'lite.duckduckgo.com', 'html.duckduckgo.com',
  'example.com', 'w3schools.com', 'codepen.io', 'jsfiddle.net',
  'archive.org', 'datatables.net', 'wolframalpha.com',
  'w3.org', 'openstreetmap.org', 'overpass-turbo.eu',
  'github.io', 'githubusercontent.com', 'medium.com',
  'stackoverflow.com', 'stackexchange.com', 'superuser.com',
  'math.stackexchange.com', 'askubuntu.com', 'serverfault.com',
  'news.ycombinator.com', 'reddit.com', 'old.reddit.com'
];

const SEARCH_URLS = {
  'google': 'https://www.google.com/search?q=',
  'duckduckgo': 'https://duckduckgo.com/?q=',
  'ddg': 'https://duckduckgo.com/?q=',
  'bing': 'https://www.bing.com/search?q=',
  'yahoo': 'https://search.yahoo.com/search?p=',
  'youtube': 'https://www.youtube.com/results?search_query=',
  'wiki': 'https://en.wikipedia.org/wiki/',
  'wikipedia': 'https://en.wikipedia.org/wiki/'
};

function canEmbed(url) {
  try {
    const hostname = new URL(url).hostname;
    return EMBED_OK.some(d => hostname.includes(d));
  } catch(e) { return false; }
}

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let tabs = [], activeTabId = null, tabIdCounter = 0;
let currentProxyIndex = 0;

const defaultFavorites = [
  { name:'DuckDuckGo', url:'https://duckduckgo.com', emoji:'🔍' },
  { name:'Wikipedia', url:'https://en.wikipedia.org', emoji:'📖' },
  { name:'GitHub', url:'https://github.com', emoji:'🐙' },
  { name:'YouTube', url:'https://www.youtube.com', emoji:'▶️' },
  { name:'Reddit', url:'https://www.reddit.com', emoji:'🔴' },
  { name:'Hacker News', url:'https://news.ycombinator.com', emoji:'📰' },
  { name:'Stack Overflow', url:'https://stackoverflow.com', emoji:'💻' },
  { name:'Apple', url:'https://www.apple.com', emoji:'🍎' },
];

let favorites = loadJSON('safari_favs') || [...defaultFavorites];
let history = loadJSON('safari_hist') || [];
let readingList = loadJSON('safari_read') || [];

function loadJSON(k) { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } }
function saveJSON(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

// ═══════════════════════════════════════════════════════════════
// DOM REFS
// ═══════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const urlInput = $('url-input');
const content = $('content');
const startPage = $('start-page');
const blockedPage = $('blocked');
const tabsRow = $('tabs-row');
const newTabBtn = $('btn-new-tab');
const loading = $('loading');
const backBtn = $('btn-back');
const fwdBtn = $('btn-fwd');
const shareMenu = $('share-menu');
const modal = $('modal');
const statusDot = $('status-dot');
const statusText = $('status-text');
const xfbStatus = $('xfb-status');
const xfbModal = $('xfb-modal');
const xfbProgress = $('xfb-progress');
const xfbProxy = $('xfb-proxy');
const tabCount = $('tab-count');

// ═══════════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════════
function createTab(url = '') {
  const id = ++tabIdCounter;
  const tab = { id, url, title: url ? hostLabel(url) : 'Start Page', stack: [], idx: -1, fav: '', mode: 'start', useXFrameBypass: false };
  tabs.push(tab);
  renderTabs();
  switchTab(id);
  if (url) loadUrl(url, id);
  else showStartPage();
  updateTabCount();
  return tab;
}

function closeTab(id) {
  const i = tabs.findIndex(t => t.id === id);
  if (i === -1) return;
  tabs.splice(i, 1);
  removeIframe(id);
  if (!tabs.length) { createTab(); return; }
  if (activeTabId === id) switchTab(tabs[Math.min(i, tabs.length - 1)].id);
  renderTabs();
  updateTabCount();
}

function switchTab(id) {
  activeTabId = id;
  const tab = active();
  
  // Hide all
  content.querySelectorAll('iframe').forEach(f => f.style.display = 'none');
  blockedPage.classList.add('hidden');

  if (tab) {
    if (tab.mode === 'start') {
      showStartPage();
      urlInput.value = '';
      backBtn.disabled = true;
      fwdBtn.disabled = true;
      setStatus('ready', 'Ready');
    } else {
      const iframe = $('iframe-' + id);
      if (iframe) {
        iframe.style.display = 'block';
        startPage.classList.add('hidden');
      } else if (tab.url) {
        loadUrl(tab.url, id);
      }
      urlInput.value = tab.url;
      updateNav();
      if (tab.mode === 'loaded') setStatus('success', 'Loaded');
      else if (tab.mode === 'loading') setStatus('loading', 'Loading...');
    }
  }
  renderTabs();
}

function active() { return tabs.find(t => t.id === activeTabId); }

function updateTabCount() {
  const count = tabs.length;
  tabCount.textContent = `${count} tab${count !== 1 ? 's' : ''}`;
}

// ═══════════════════════════════════════════════════════════════
// TAB RENDERING
// ═══════════════════════════════════════════════════════════════
function renderTabs() {
  tabsRow.querySelectorAll('.tab').forEach(t => t.remove());
  tabs.forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    const icon = tab.fav ? `<img src="${tab.fav}" onerror="this.parentElement.textContent='🌐'">` : '🌐';
    el.innerHTML = `<div class="tab-fav">${icon}</div><div class="tab-name">${esc(tab.title)}</div><button class="tab-x">×</button>`;
    el.onclick = (e) => { if (e.target.closest('.tab-x')) { closeTab(tab.id); return; } switchTab(tab.id); };
    tabsRow.insertBefore(el, newTabBtn);
  });
}

// ═══════════════════════════════════════════════════════════════
// STATUS BAR
// ═══════════════════════════════════════════════════════════════
function setStatus(type, text) {
  statusDot.className = 'status-dot';
  if (type === 'loading') statusDot.classList.add('loading');
  else if (type === 'success') statusDot.classList.add('success');
  else if (type === 'error') statusDot.classList.add('error');
  statusText.textContent = text;
  xfbStatus.style.display = type === 'xfb' ? 'flex' : 'none';
}

// ═══════════════════════════════════════════════════════════════
// URL PARSING & LOADING
// ═══════════════════════════════════════════════════════════════
function parseInput(raw) {
  raw = raw.trim();
  if (!raw) return '';

  // Search engine prefix: "g query" → Google
  const prefixMatch = raw.match(/^(\w+)\s+(.+)/);
  if (prefixMatch && SEARCH_URLS[prefixMatch[1].toLowerCase()]) {
    return SEARCH_URLS[prefixMatch[1].toLowerCase()] + encodeURIComponent(prefixMatch[2]);
  }

  // Plain search
  if (!raw.includes('.') || raw.includes(' ')) {
    return 'https://duckduckgo.com/?q=' + encodeURIComponent(raw);
  }

  if (!raw.startsWith('http')) raw = 'https://' + raw;
  return raw;
}

function hostLabel(url) {
  try {
    const u = new URL(url);
    const q = u.searchParams.get('q') || u.searchParams.get('search_query');
    if (q) return decodeURIComponent(q);
    return u.hostname.replace('www.', '');
  } catch(e) { return url; }
}

function faviconUrl(url) {
  try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=32`; } catch(e) { return ''; }
}

async function loadUrl(url, tabId = activeTabId) {
  const tab = tabs.find(t => t.id === tabId);
  if (!tab) return;

  tab.url = url;
  tab.title = hostLabel(url);
  tab.fav = faviconUrl(url);
  tab.mode = 'loading';
  tab.useXFrameBypass = !canEmbed(url) && XFRAME_BYPASS_ENABLED;

  // Push to history stack
  if (tab.idx < tab.stack.length - 1) tab.stack = tab.stack.slice(0, tab.idx + 1);
  tab.stack.push(url);
  tab.idx = tab.stack.length - 1;

  // Global history
  history.unshift({ url, title: tab.title, ts: Date.now() });
  saveJSON('safari_hist', history.slice(0, 200));

  blockedPage.classList.add('hidden');
  startPage.classList.add('hidden');

  // Show loading
  loading.classList.remove('hidden');
  loading.style.width = '15%';
  setStatus('loading', 'Loading...');

  if (tab.useXFrameBypass) {
    setStatus('xfb', 'Bypassing X-Frame...');
    xfbStatus.style.display = 'flex';
  }

  if (canEmbed(url)) {
    loadDirect(url, tab, tabId);
  } else if (XFRAME_BYPASS_ENABLED) {
    loadWithXFrameBypass(url, tab, tabId);
  } else {
    loadDirect(url, tab, tabId); // Try direct anyway
  }

  if (tabId === activeTabId) {
    urlInput.value = url;
    updateNav();
    renderTabs();
  }
}

function removeIframe(id) {
  const f = $('iframe-' + id);
  if (f) f.remove();
}

function loadDirect(url, tab, tabId) {
  removeIframe(tabId);
  const iframe = document.createElement('iframe');
  iframe.id = 'iframe-' + tabId;
  iframe.style.display = 'block';
  iframe.sandbox = 'allow-same-origin allow-scripts allow-popups allow-forms';
  content.appendChild(iframe);
  hideOtherFrames(tabId);

  loading.style.width = '50%';

  iframe.onload = () => {
    loading.style.width = '100%';
    setTimeout(() => { 
      loading.classList.add('hidden'); 
      loading.style.width = '0'; 
      setStatus('success', 'Loaded');
      xfbStatus.style.display = 'none';
    }, 250);
    tab.mode = 'loaded';
    try {
      const t = iframe.contentDocument?.title;
      if (t) { tab.title = t; renderTabs(); }
    } catch(e) {}
    if (tabId === activeTabId) updateNav();
    renderTabs();
  };

  iframe.onerror = () => {
    loading.classList.add('hidden');
    loading.style.width = '0';
    setStatus('error', 'Failed to load');
    if (XFRAME_BYPASS_ENABLED && !tab.useXFrameBypass) {
      // Try X-Frame-Bypass as fallback
      loadWithXFrameBypass(url, tab, tabId);
    } else {
      showBlocked(url, tab, tabId);
    }
  };

  iframe.src = url;
}

async function loadWithXFrameBypass(url, tab, tabId) {
  removeIframe(tabId);
  tab.useXFrameBypass = true;
  
  // Show X-Frame-Bypass modal
  xfbModal.classList.add('show');
  xfbProgress.style.width = '0%';
  
  // Try each proxy
  for (let i = 0; i < XFRAME_BYPASS_PROXIES.length; i++) {
    const proxy = XFRAME_BYPASS_PROXIES[i];
    xfbProxy.textContent = `Trying proxy ${i + 1} of ${XFRAME_BYPASS_PROXIES.length}...`;
    xfbProgress.style.width = `${(i / XFRAME_BYPASS_PROXIES.length) * 100}%`;
    
    try {
      // Create iframe with x-frame-bypass attribute
      const iframe = document.createElement('iframe', { is: 'x-frame-bypass' });
      iframe.id = 'iframe-' + tabId;
      iframe.style.display = 'block';
      iframe.sandbox = 'allow-same-origin allow-scripts allow-popups allow-forms';
      content.appendChild(iframe);
      hideOtherFrames(tabId);
      
      // Set the source - x-frame-bypass will handle the proxy
      iframe.src = url;
      
      // Wait for load
      await new Promise((resolve, reject) => {
        iframe.onload = resolve;
        iframe.onerror = reject;
        setTimeout(reject, 8000); // 8 second timeout per proxy
      });
      
      // Success!
      loading.style.width = '100%';
      setTimeout(() => { 
        loading.classList.add('hidden'); 
        loading.style.width = '0'; 
        setStatus('success', 'Loaded via X-Frame-Bypass');
        xfbModal.classList.remove('show');
        xfbStatus.style.display = 'flex';
      }, 250);
      
      tab.mode = 'loaded';
      try {
        const t = iframe.contentDocument?.title;
        if (t) { tab.title = t; renderTabs(); }
      } catch(e) {}
      
      if (tabId === activeTabId) updateNav();
      renderTabs();
      return; // Success, exit function
      
    } catch (error) {
      console.log(`Proxy ${i + 1} failed:`, error);
      // Try next proxy
    }
  }
  
  // All proxies failed
  xfbModal.classList.remove('show');
  loading.classList.add('hidden');
  loading.style.width = '0';
  setStatus('error', 'X-Frame-Bypass failed');
  showBlocked(url, tab, tabId);
}

function hideOtherFrames(tabId) {
  content.querySelectorAll('iframe').forEach(f => { if (f.id !== 'iframe-' + tabId) f.style.display = 'none'; });
}

// ═══════════════════════════════════════════════════════════════
// BLOCKED PAGE
// ═══════════════════════════════════════════════════════════════
function showBlocked(url, tab, tabId) {
  loading.classList.add('hidden');
  loading.style.width = '0';
  removeIframe(tabId);
  tab.mode = 'blocked';
  setStatus('error', 'Blocked by X-Frame-Options');

  if (tabId !== activeTabId) { renderTabs(); return; }

  blockedPage.classList.remove('hidden');
  startPage.classList.add('hidden');

  blockedPage.innerHTML = `
    <div class="blocked-icon">🔒</div>
    <div class="blocked-title">${esc(hostLabel(url))}</div>
    <div class="blocked-url">${esc(url)}</div>
    <div class="blocked-desc">This website doesn't allow embedding in iframes due to X-Frame-Options or Content-Security-Policy headers.</div>
    <div class="blocked-btns">
      <button class="bbtn bbtn-primary" onclick="openNewWindow('${esc(url)}')">↗ Open in New Window</button>
      <button class="bbtn bbtn-secondary" onclick="copyUrl('${esc(url)}')">📋 Copy Link</button>
      <button class="bbtn bbtn-secondary" onclick="retryLoad('${esc(url)}')">🔄 Try Again</button>
    </div>
    <div class="blocked-tip">💡 Tip: Websites like Wikipedia, DuckDuckGo, and Stack Overflow work in Safari. Try searching with "site:wikipedia.org" to find embeddable content.</div>
  `;
  renderTabs();
}

function openNewWindow(url) {
  try {
    window.parent.postMessage({ type: 'openWindow', url, title: hostLabel(url), icon: './images/Safari.png' }, '*');
    toast('Opening in new window...');
  } catch(e) {
    window.open(url, '_blank');
  }
}

function retryLoad(url) {
  const tab = active();
  if (tab) loadUrl(url, tab.id);
}

function copyUrl(url) {
  navigator.clipboard?.writeText(url).catch(() => {});
  toast('Link copied!');
}

// ═══════════════════════════════════════════════════════════════
// START PAGE
// ═══════════════════════════════════════════════════════════════
function showStartPage() {
  blockedPage.classList.add('hidden');
  startPage.classList.remove('hidden');
  content.querySelectorAll('iframe').forEach(f => f.style.display = 'none');
  renderStart();
}

function renderStart() {
  const h = new Date().getHours();
  const greet = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
  const recent = history.slice(0, 6);

  startPage.innerHTML = `
    <div class="sp-greeting">${greet}</div>
    <div class="sp-sub">Search or enter a website</div>

    <div class="section">
      <div class="section-head"><span>Favorites</span><button onclick="addFavModal()">+ Add</button></div>
      <div class="fav-grid">
        ${favorites.map((f, i) => `
          <div class="fav-item" onclick="openFav(${i})">
            <div class="fav-icon">${f.emoji ? `<span style="font-size:22px">${f.emoji}</span>` : `<img src="${faviconUrl(f.url)}" onerror="this.parentElement.textContent='🌐'">`}</div>
            <div class="fav-label">${esc(f.name)}</div>
          </div>
        `).join('')}
      </div>
    </div>

    ${recent.length ? `
    <div class="section">
      <div class="section-head"><span>Recent</span><button onclick="clearHist()">Clear</button></div>
      <div class="hist-list">
        ${recent.map((h, i) => `
          <div class="hist-item" onclick="openHist(${i})">
            <div class="hist-icon">🌐</div>
            <div class="hist-info">
              <div class="hist-title">${esc(h.title)}</div>
              <div class="hist-url">${esc(h.url)}</div>
            </div>
            <div class="hist-time">${timeAgo(h.ts)}</div>
            <button class="hist-rm" onclick="event.stopPropagation();rmHist(${i})">×</button>
          </div>
        `).join('')}
      </div>
    </div>` : ''}

    ${readingList.length ? `
    <div class="section">
      <div class="section-head"><span>Reading List</span></div>
      <div class="hist-list">
        ${readingList.map((r, i) => `
          <div class="hist-item" onclick="openRead(${i})">
            <div class="hist-icon">📖</div>
            <div class="hist-info">
              <div class="hist-title">${esc(r.title)}</div>
              <div class="hist-url">${esc(r.url)}</div>
            </div>
            <button class="hist-rm" onclick="event.stopPropagation();rmRead(${i})">×</button>
          </div>
        `).join('')}
      </div>
    </div>` : ''}
  `;
}

function openFav(i) { const f = favorites[i]; const t = active(); if (t && t.mode === 'start') loadUrl(f.url); else createTab(f.url); }
function openHist(i) { const h = history[i]; const t = active(); if (t && t.mode === 'start') loadUrl(h.url); else createTab(h.url); }
function openRead(i) { const r = readingList[i]; const t = active(); if (t && t.mode === 'start') loadUrl(r.url); else createTab(r.url); }
function clearHist() { history = []; saveJSON('safari_hist', history); renderStart(); toast('History cleared'); }
function rmHist(i) { history.splice(i, 1); saveJSON('safari_hist', history); renderStart(); }
function rmRead(i) { readingList.splice(i, 1); saveJSON('safari_read', readingList); renderStart(); }

// ═══════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════
function updateNav() {
  const t = active();
  backBtn.disabled = !t || t.idx <= 0;
  fwdBtn.disabled = !t || t.idx >= t.stack.length - 1;
}

backBtn.onclick = () => {
  const t = active(); if (!t || t.idx <= 0) return;
  t.idx--; loadUrl(t.stack[t.idx], t.id);
};
fwdBtn.onclick = () => {
  const t = active(); if (!t || t.idx >= t.stack.length - 1) return;
  t.idx++; loadUrl(t.stack[t.idx], t.id);
};
$('btn-refresh').onclick = () => {
  const t = active(); if (!t || !t.url) return;
  loadUrl(t.url, t.id);
};

// ═══════════════════════════════════════════════════════════════
// URL BAR
// ═══════════════════════════════════════════════════════════════
urlInput.onkeydown = (e) => {
  if (e.key === 'Enter') {
    const url = parseInput(urlInput.value);
    if (url) {
      const t = active();
      if (t && t.mode === 'start') loadUrl(url);
      else loadUrl(url);
    }
    urlInput.blur();
  }
};
urlInput.onfocus = () => setTimeout(() => urlInput.select(), 10);
$('url-go').onclick = () => {
  const url = parseInput(urlInput.value);
  if (url) loadUrl(url);
};

// ═══════════════════════════════════════════════════════════════
// NEW TAB / SHORTCUTS
// ═══════════════════════════════════════════════════════════════
newTabBtn.onclick = () => createTab();
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 't') { e.preventDefault(); createTab(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'w') { e.preventDefault(); if (activeTabId) closeTab(activeTabId); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'l') { e.preventDefault(); urlInput.focus(); }
});

// ═══════════════════════════════════════════════════════════════
// SHARE
// ═══════════════════════════════════════════════════════════════
$('btn-share').onclick = (e) => {
  e.stopPropagation();
  const r = e.currentTarget.getBoundingClientRect();
  shareMenu.style.top = (r.bottom + 4) + 'px';
  shareMenu.style.right = (window.innerWidth - r.right) + 'px';
  shareMenu.style.left = 'auto';
  shareMenu.classList.toggle('show');
};
document.addEventListener('click', (e) => { if (!e.target.closest('#share-menu') && !e.target.closest('#btn-share')) shareMenu.classList.remove('show'); });

function doShare(action) {
  const t = active(); shareMenu.classList.remove('show');
  if (!t?.url) return;
  if (action === 'copy') { navigator.clipboard?.writeText(t.url).catch(()=>{}); toast('Copied!'); }
  else if (action === 'newtab') createTab(t.url);
  else if (action === 'fav') { addFavModal(t); }
  else if (action === 'read') { readingList.unshift({ title: t.title, url: t.url, ts: Date.now() }); saveJSON('safari_read', readingList); toast('Added to Reading List'); }
  else if (action === 'open') { openNewWindow(t.url); }
}

// ═══════════════════════════════════════════════════════════════
// FAVORITES MODAL
// ═══════════════════════════════════════════════════════════════
function addFavModal(tab) {
  tab = tab || active();
  $('modal-title').textContent = 'Add to Favorites';
  $('modal-name').value = tab ? tab.title : '';
  $('modal-url').value = tab ? tab.url : '';
  $('modal-save').textContent = 'Add';
  modal.classList.remove('hidden');
  modal._mode = 'add';
}
function closeModal() { modal.classList.add('hidden'); }
function saveModal() {
  const name = $('modal-name').value.trim();
  const url = $('modal-url').value.trim();
  if (!name || !url) return;
  favorites.push({ name, url, emoji: '' });
  saveJSON('safari_favs', favorites);
  closeModal();
  renderStart();
  toast('Added to Favorites');
}
modal.onclick = (e) => { if (e.target === modal) closeModal(); };

// ═══════════════════════════════════════════════════════════════
// TAB OVERVIEW
// ═══════════════════════════════════════════════════════════════
let overview = false;
$('btn-tabs').onclick = () => {
  overview = !overview;
  if (overview) showOverview();
  else if (active()) switchTab(activeTabId);
};

function showOverview() {
  content.querySelectorAll('iframe').forEach(f => f.style.display = 'none');
  blockedPage.classList.add('hidden');
  startPage.classList.remove('hidden');
  startPage.innerHTML = `
    <div class="sp-greeting" style="font-size:24px;margin-bottom:20px">Open Tabs</div>
    <div class="section">
      <div class="section-head"><span>${tabs.length} tab${tabs.length !== 1 ? 's' : ''}</span><button onclick="closeAll()">Close All</button></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px">
        ${tabs.map(t => `
          <div style="background:var(--card);border:1px solid var(--card-border);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform 0.15s"
               onmouseover="this.style.transform='scale(1.03)'"
               onmouseout="this.style.transform=''"
               onclick="overview=false;switchTab(${t.id})">
            <div style="height:100px;background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:11px;overflow:hidden">
              ${t.url && t.mode !== 'blocked' && t.mode !== 'start'
                ? `<iframe src="${t.url}" style="width:300%;height:300%;transform:scale(0.33);transform-origin:top left;pointer-events:none;border:none"></iframe>`
                : (t.mode === 'blocked' ? '⚠️ Blocked' : '🏠 Start')}
            </div>
            <div style="padding:8px 10px;display:flex;align-items:center;gap:6px">
              <span style="font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.title)}</span>
              <button style="width:18px;height:18px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;border-radius:3px;font-size:12px;display:flex;align-items:center;justify-content:center"
                      onclick="event.stopPropagation();closeTab(${t.id});tabs.length?showOverview():(overview=false,createTab())">✕</button>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function closeAll() {
  tabs.forEach(t => removeIframe(t.id));
  tabs = []; activeTabId = null; overview = false;
  createTab();
}

// ═══════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function timeAgo(ts) {
  const m = Math.floor((Date.now() - ts) / 60000);
  if (m < 1) return 'now'; if (m < 60) return m + 'm';
  const h = Math.floor(m / 60); if (h < 24) return h + 'h';
  return Math.floor(h / 24) + 'd';
}

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
createTab();
</script>
</body>
</html>
