<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacOS 26</title>
<link rel="icon" href="./apple.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ----------------- General ----------------- */
*, *::before, *::after { box-sizing: border-box; }
body, html {
  margin:0; padding:0; width:100%; height:100%;
  overflow:hidden;
  font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  background: url('Macbg.jpg') center/cover no-repeat;
  user-select:none; -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none;
}

/* ----------------- Top Nav ----------------- */
#top-nav {
  position: fixed; top:0; left:0; right:0; height:28px;
  background: rgba(30,30,30,0.65);
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 8px; z-index:1000;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

/* Left section */
.nav-left {
  display:flex; align-items:center; gap:2px; flex-shrink:0;
}
.nav-left .apple-logo {
  width:14px; height:14px;
  padding:4px 10px 4px 6px;
  opacity:0.9;
  cursor:pointer;
  transition: opacity 0.15s;
}
.nav-left .apple-logo:hover { opacity:1; }
.nav-left .apple-logo img { width:14px; height:14px; display:block; }
.nav-app-name {
  color:#fff; font-weight:600; font-size:13px;
  padding:2px 10px; border-radius:4px;
  cursor:default;
}
.nav-app-name:hover { background:rgba(255,255,255,0.1); }
.nav-separator {
  width:1px; height:16px; background:rgba(255,255,255,0.15);
  margin:0 6px;
}
.nav-menu-item {
  color:rgba(255,255,255,0.85); font-size:13px;
  padding:2px 10px; border-radius:4px; cursor:default;
  transition: background 0.15s;
}
.nav-menu-item:hover { background:rgba(255,255,255,0.12); color:#fff; }

/* Right section */
.nav-right {
  display:flex; align-items:center; gap:2px; flex-shrink:0;
}
.nav-icon {
  color:rgba(255,255,255,0.85); font-size:12px;
  padding:2px 6px; border-radius:4px; cursor:default;
  transition: background 0.15s;
  display:flex; align-items:center; gap:4px;
}
.nav-icon:hover { background:rgba(255,255,255,0.12); }
.nav-icon svg { width:14px; height:14px; fill:currentColor; }

/* Clock */
.nav-clock {
  color:#fff; font-size:13px; font-weight:500;
  padding:2px 10px; border-radius:4px; cursor:default;
  letter-spacing:0.2px;
  transition: background 0.15s;
  min-width:160px; text-align:right;
}
.nav-clock:hover { background:rgba(255,255,255,0.12); }

/* ----------------- Dock ----------------- */
#dock {
  position: fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background: rgba(28,28,30,0.75);
  backdrop-filter: blur(25px) saturate(150%);
  -webkit-backdrop-filter: blur(25px) saturate(150%);
  padding:6px 14px;
  border-radius:18px;
  display:flex; gap:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.45), inset 0 0 0 0.5px rgba(255,255,255,0.1);
  z-index:1000;
  transition: all 0.3s ease;
  border:1px solid rgba(255,255,255,0.12);
}
.dock-app {
  width:54px; height:54px;
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), margin 0.25s ease;
  cursor:pointer;
  border-radius:12px;
  position:relative;
}
.dock-app:hover {
  transform: scale(1.55) translateY(-12px);
  margin: 0 8px;
}
.dock-tooltip {
  position:absolute; bottom:100%; left:50%; transform:translateX(-50%);
  background:rgba(30,30,30,0.9); color:#fff; font-size:12px;
  padding:4px 10px; border-radius:5px; white-space:nowrap;
  pointer-events:none; opacity:0; transition:opacity 0.15s;
  margin-bottom:8px;
  backdrop-filter:blur(10px);
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.dock-app:hover .dock-tooltip { opacity:1; }

/* Dock separator */
.dock-separator {
  width:1px; height:40px; background:rgba(255,255,255,0.2);
  align-self:center; margin:0 4px;
}

/* ----------------- Finder (Desktop) ----------------- */
#finder {
  position: absolute;
  top:38px; left:0; right:0; bottom:100px;
}
.finder-app {
  width:90px; text-align:center;
  cursor:pointer; position:absolute;
  transition: transform 0.2s ease, left 0.15s ease, top 0.15s ease;
  padding:8px 6px; border-radius:8px;
}
.finder-app:hover { background: rgba(255,255,255,0.15); }
.finder-app.selected { background: rgba(0,122,255,0.4); }
.finder-app img { width:56px; height:56px; pointer-events:none; }
.finder-app span {
  display:block; margin-top:5px; font-size:11px; color:#fff;
  text-shadow:0 1px 4px rgba(0,0,0,0.9);
  line-height:1.3; word-break:break-word;
}

/* ----------------- Window ----------------- */
.window {
  position:absolute;
  min-width:400px; min-height:250px;
  background: rgba(30,30,32,0.97);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border-radius:10px; overflow:hidden;
  display:flex; flex-direction:column;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(255,255,255,0.1);
}
.window.maximized {
  top:28px !important; left:0 !important;
  width:100% !important; height: calc(100vh - 28px) !important;
  border-radius:0;
}
.window.minimized {
  transform: scale(0.1);
  opacity:0;
  pointer-events:none;
}
.window-header {
  height:42px; background: rgba(50,50,52,0.98);
  display:flex; align-items:center; padding:0 14px;
  cursor:default; flex-shrink:0;
  border-bottom:1px solid rgba(0,0,0,0.3);
}
.window-header .title {
  color:rgba(255,255,255,0.9); margin-left:8px; font-size:13px; font-weight:500;
  flex:1; text-align:center; pointer-events:none;
}
.traffic-lights { display:flex; gap:8px; flex-shrink:0; }
.traffic {
  width:12px; height:12px; border-radius:50%;
  cursor:pointer; position:relative;
  transition: filter 0.15s ease;
}
.traffic:hover { filter: brightness(1.15); }
.red { background:#ff5f57; border:1px solid #e0443e; }
.yellow { background:#febc2e; border:1px solid #dea123; }
.green { background:#28c840; border:1px solid #1aab29; }
.traffic .icon {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-size:8px; color:rgba(0,0,0,0.55); opacity:0;
  transition: opacity 0.15s ease; font-weight:bold;
}
.traffic-lights:hover .traffic .icon { opacity:1; }
.window-body { flex:1; overflow:hidden; }
.window-body iframe { width:100%; height:100%; border:none; display:block; }

</style>
</head>
<body>

<!-- Top Nav -->
<div id="top-nav">
  <div class="nav-left">
    <div class="apple-logo" id="apple-menu">
      <img src="./apple.png" alt="Apple">
    </div>
    <div class="nav-app-name" id="active-app-name">Finder</div>
    <div class="nav-separator"></div>
    <div class="nav-menu-item">File</div>
    <div class="nav-menu-item">Edit</div>
    <div class="nav-menu-item">View</div>
    <div class="nav-menu-item">Go</div>
    <div class="nav-menu-item">Window</div>
    <div class="nav-menu-item">Help</div>
  </div>
  <div class="nav-right">
    <!-- Battery -->
    <div class="nav-icon" title="Battery">
      <svg viewBox="0 0 24 24"><path d="M17 6H5a2 2 0 00-2 2v8a2 2 0 002 2h12a2 2 0 002-2V8a2 2 0 00-2-2zm3 4v4a1 1 0 002 0v-4a1 1 0 00-2 0z"/></svg>
    </div>
    <!-- WiFi -->
    <div class="nav-icon" title="Wi-Fi">
      <svg viewBox="0 0 24 24"><path d="M1.29 8.03l9.42 9.42a1 1 0 001.41 0l9.42-9.42A11.94 11.94 0 0012 3.25a11.94 11.94 0 00-10.71 4.78zm14.36 2.8L12 14.47l-3.65-3.65a6 6 0 017.3 0z"/></svg>
    </div>
    <!-- Search -->
    <div class="nav-icon" title="Spotlight">
      <svg viewBox="0 0 24 24"><path d="M10 2a8 8 0 105.3 14.7l4.2 4.2a1 1 0 001.4-1.4l-4.2-4.2A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"/></svg>
    </div>
    <!-- Control Center -->
    <div class="nav-icon" title="Control Center">
      <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h10M4 18h6"/></svg>
    </div>
    <!-- Clock -->
    <div class="nav-clock" id="nav-clock"></div>
  </div>
</div>

<!-- Finder (Desktop) -->
<div id="finder"></div>

<!-- Dock -->
<div id="dock"></div>

<!-- Windows container -->
<div id="windows-container"></div>

<script>
// ============ LIVE CLOCK ============
const clockEl = document.getElementById('nav-clock');
const activeAppName = document.getElementById('active-app-name');

function updateClock() {
  const now = new Date();
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const day = days[now.getDay()];
  const month = months[now.getMonth()];
  const date = now.getDate();
  let hours = now.getHours();
  const minutes = String(now.getMinutes()).padStart(2, '0');
  const ampm = hours >= 12 ? 'PM' : 'AM';
  hours = hours % 12 || 12;
  clockEl.textContent = `${day} ${month} ${date}  ${hours}:${minutes} ${ampm}`;
}
updateClock();
setInterval(updateClock, 1000);

// ============ CONFIG ============
const appsList = [
  { name:'Safari',          url:'./Safari.html',                       icon:'./images/Safari.png',   w:900, h:600 },
  { name:'YouTube',         url:'./yt.html',                           icon:'./images/YouTube.png',  w:960, h:640 },
  { name:'ChatGPT',         url:'./GPT.html',                          icon:'./images/ChatGPT.png',  w:800, h:560 },
  { name:'Settings',        url:'index.html',                          icon:'./images/Settings.png', w:680, h:480 },
  { name:'Ampler Launcher', url:'https://ampler-launcher.wasmer.app/', icon:'./images/Ampler.png',   w:800, h:550 },
  { name:'Terminal',        url:'./terminal.html',                     icon:'./images/Terminal.png', w:700, h:420 },
  { name:'Apple Music',     url:'https://freefy.app',                  icon:'./images/Music.png',    w:900, h:600 },
  { name:'Steam Library',   url:'./steam.html',                        icon:'./images/Steam.png',    w:960, h:640 }
];

const finder = document.getElementById('finder');
const dock = document.getElementById('dock');
const windowsContainer = document.getElementById('windows-container');
let topZ = 100;
let openWindows = [];

// ============ BUILD FINDER & DOCK ============
appsList.forEach((app, i) => {
  // --- Finder icon ---
  const f = document.createElement('div');
  f.className = 'finder-app';
  const col = i % 4;
  const row = Math.floor(i / 4);
  f.style.left = (30 + col * 110) + 'px';
  f.style.top  = (20 + row * 110) + 'px';
  f.innerHTML = `<img src="${app.icon}" alt="${app.name}"><span>${app.name}</span>`;
  f.addEventListener('click', (e) => {
    if (e.detail === 2) openWindow(app);
    document.querySelectorAll('.finder-app').forEach(el => el.classList.remove('selected'));
    f.classList.add('selected');
  });
  finder.appendChild(f);

  // --- Dock icon ---
  const d = document.createElement('img');
  d.src = app.icon;
  d.alt = app.name;
  d.className = 'dock-app';
  d.innerHTML = `<div class="dock-tooltip">${app.name}</div>`;
  d.addEventListener('click', () => openWindow(app));
  dock.appendChild(d);
});

// Add dock separator after last launcher app
const sep = document.createElement('div');
sep.className = 'dock-separator';
dock.appendChild(sep);

// ============ DRAG FINDER ICONS ============
let dragApp = null, dragOffX = 0, dragOffY = 0;
const TOP_BAR = 28, DOCK_ZONE = 100;

document.querySelectorAll('.finder-app').forEach(el => {
  el.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    dragApp = el;
    const rect = el.getBoundingClientRect();
    dragOffX = e.clientX - rect.left;
    dragOffY = e.clientY - rect.top;
    el.style.transition = 'none';
    el.style.zIndex = 50;
  });
});

document.addEventListener('mousemove', (e) => {
  if (!dragApp) return;
  let x = e.clientX - dragOffX;
  let y = e.clientY - dragOffY;
  const maxX = window.innerWidth - dragApp.offsetWidth;
  const maxY = window.innerHeight - dragApp.offsetHeight - DOCK_ZONE;
  dragApp.style.left = Math.min(Math.max(0, x), maxX) + 'px';
  dragApp.style.top  = Math.max(TOP_BAR, Math.min(y, maxY)) + 'px';
});

document.addEventListener('mouseup', () => {
  if (dragApp) {
    dragApp.style.transition = '';
    dragApp.style.zIndex = '';
    dragApp = null;
  }
});

// ============ UPDATE TOP BAR APP NAME ============
function updateActiveApp(name) {
  activeAppName.textContent = name || 'Finder';
}

// ============ OPEN WINDOW ============
function openWindow(app) {
  const existing = openWindows.find(w => w.dataset.url === app.url);
  if (existing) {
    existing.classList.remove('minimized');
    bringToFront(existing);
    updateActiveApp(app.name);
    return;
  }

  const w = document.createElement('div');
  w.className = 'window';
  w.dataset.url = app.url;
  w.dataset.name = app.name;
  w.style.width  = (app.w || 800) + 'px';
  w.style.height = (app.h || 500) + 'px';
  w.style.left = Math.max(0, (window.innerWidth  - (app.w || 800)) / 2) + 'px';
  w.style.top  = Math.max(TOP_BAR + 10, (window.innerHeight - (app.h || 500) - DOCK_ZONE) / 2) + 'px';
  bringToFront(w);

  w.innerHTML = `
    <div class="window-header">
      <div class="traffic-lights">
        <div class="traffic red" title="Close"><span class="icon">✕</span></div>
        <div class="traffic yellow" title="Minimize"><span class="icon">−</span></div>
        <div class="traffic green" title="Fullscreen"><span class="icon">⤢</span></div>
      </div>
      <div class="title">${app.name}</div>
      <div style="width:44px;"></div>
    </div>
    <div class="window-body">
      <iframe src="${app.url}"></iframe>
    </div>
  `;

  w.querySelector('.red').addEventListener('click', (e) => {
    e.stopPropagation();
    closeWindow(w);
  });
  w.querySelector('.yellow').addEventListener('click', (e) => {
    e.stopPropagation();
    w.classList.toggle('minimized');
  });
  w.querySelector('.green').addEventListener('click', (e) => {
    e.stopPropagation();
    w.classList.toggle('maximized');
  });

  windowsContainer.appendChild(w);
  openWindows.push(w);
  initWindowDrag(w);
  updateActiveApp(app.name);
}

function bringToFront(w) {
  w.style.zIndex = ++topZ;
  updateActiveApp(w.dataset.name);
}

function closeWindow(w) {
  w.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
  w.style.transform = 'scale(0.9)';
  w.style.opacity = '0';
  setTimeout(() => {
    w.remove();
    openWindows = openWindows.filter(x => x !== w);
    // Show name of topmost remaining window or Finder
    const topWin = openWindows.reduce((a, b) =>
      (parseInt(a.style.zIndex||0) > parseInt(b.style.zIndex||0)) ? a : b, null);
    updateActiveApp(topWin ? topWin.dataset.name : null);
  }, 200);
}

windowsContainer.addEventListener('mousedown', (e) => {
  const win = e.target.closest('.window');
  if (win) bringToFront(win);
});

// ============ WINDOW DRAGGING ============
function initWindowDrag(win) {
  const header = win.querySelector('.window-header');
  let dragging = false, offX = 0, offY = 0;

  header.addEventListener('mousedown', (e) => {
    if (e.target.closest('.traffic')) return;
    if (win.classList.contains('maximized')) return;
    dragging = true;
    const rect = win.getBoundingClientRect();
    offX = e.clientX - rect.left;
    offY = e.clientY - rect.top;
    win.style.transition = 'none';
    bringToFront(win);
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    let x = e.clientX - offX;
    let y = e.clientY - offY;
    y = Math.max(TOP_BAR - 10, Math.min(y, window.innerHeight - 40));
    x = Math.max(-win.offsetWidth + 100, Math.min(x, window.innerWidth - 100));
    win.style.left = x + 'px';
    win.style.top  = y + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (dragging) { dragging = false; win.style.transition = ''; }
  });
}

// ============ CLICK DESKTOP TO DESELECT ============
finder.addEventListener('click', (e) => {
  if (e.target === finder) {
    document.querySelectorAll('.finder-app').forEach(el => el.classList.remove('selected'));
    updateActiveApp(null);
  }
});
</script>

</body>
</html>
