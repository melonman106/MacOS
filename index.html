<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacOS 26</title>
<link rel="icon" href="./apple.png" type="image/png">
<style>
:root {
  --mac-blur: blur(20px);
  --window-bg: rgba(28,28,30,0.85);
  --border-radius: 12px;
}
body, html {
  margin:0; height:100%; overflow:hidden;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: url("Macbg.jpg") center/cover no-repeat fixed #1a1a1a;
  color:white;
}
.top-bar {
  height:28px; background:rgba(0,0,0,0.3); backdrop-filter:var(--mac-blur);
  display:flex; justify-content:space-between; align-items:center;
  padding:0 15px; font-size:13px; color:white; z-index:10000;
  box-shadow:0 1px 5px rgba(0,0,0,0.2);
}
.top-left { display:flex; align-items:center; gap:8px; }
#apple-icon { width:18px; height:18px; object-fit:contain; }

.window {
  position:absolute; width:600px; height:450px;
  background:var(--window-bg); border-radius:var(--border-radius);
  box-shadow:0 30px 70px rgba(0,0,0,0.5); display:flex;
  flex-direction:column; border:0.5px solid rgba(255,255,255,0.2);
  backdrop-filter:var(--mac-blur); overflow:hidden;
  transition:opacity 0.2s, transform 0.2s;
}
.window.minimized {
  transform: scale(0.8) translateY(500px); opacity:0; pointer-events:none;
}
.window-header {
  height:38px; display:flex; align-items:center; padding:0 12px;
  cursor:default; user-select:none; background:rgba(255,255,255,0.05);
}
.traffic-lights { display:flex; gap:8px; width:60px; }
.dot { width:12px; height:12px; border-radius:50%; cursor:pointer; border:none; }
.red { background:#ff5f56; } .yellow { background:#ffbd2e; } .green { background:#27c93f; }
.window-title { flex:1; text-align:center; color:rgba(255,255,255,0.8); font-size:13px; font-weight:500; margin-right:60px; }
.window-content { flex:1; overflow:hidden; background:#1a1a1a; }

.dock {
  position:fixed; bottom:8px; left:50%; transform:translateX(-50%);
  background:rgba(255,255,255,0.15); backdrop-filter:var(--mac-blur);
  padding:4px; border-radius:18px; display:flex; gap:10px;
  border:0.5px solid rgba(255,255,255,0.3); z-index:10001; height:60px;
}
.dock-icon { width:50px; height:50px; border-radius:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform 0.2s; position:relative; }
.dock-icon img { width:90%; height:90%; object-fit:contain; }
.dock-icon:hover { transform:scale(1.3) translateY(-10px); }
.dock-icon::after { content:attr(title); position:absolute; bottom:62px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.75); color:white; font-size:11px; padding:3px 9px; border-radius:6px; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity 0.15s; }
.dock-icon:hover::after { opacity:1; }

.finder-grid { display:flex; flex-wrap:nowrap; overflow-x:auto; padding:15px; gap:20px; height:100%; }
.finder-item { display:flex; flex-direction:column; align-items:center; font-size:12px; cursor:pointer; text-align:center; padding:10px; border-radius:10px; transition:background 0.15s; }
.finder-item:hover { background:rgba(255,255,255,0.1); }
.finder-item img { width:48px; height:48px; margin-bottom:8px; object-fit:contain; }

.chat-shell { display:flex; flex-direction:column; height:100%; background:#1a1a1a; font-family:-apple-system,sans-serif; }
.chat-header { padding:14px 18px; background:#111; border-bottom:1px solid #333; display:flex; align-items:center; gap:10px; }
.chat-header img { width:24px; height:24px; } .chat-header span { color:white; font-weight:600; font-size:15px; }
.chat-model-badge { margin-left:auto; font-size:11px; color:#555; background:#222; padding:3px 10px; border-radius:20px; }
.chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; }
.chat-typing { padding:0 20px 8px; color:#666; font-size:12px; display:none; }
.chat-input-area { padding:14px; background:#111; border-top:1px solid #2a2a2a; display:flex; gap:10px; align-items:flex-end; }
.chat-textarea { flex:1; background:#222; border:1px solid #444; border-radius:12px; padding:10px 14px; color:white; font-size:14px; font-family:inherit; resize:none; outline:none; line-height:1.5; max-height:120px; overflow-y:auto; }
.chat-textarea:focus { border-color:#007aff; }
.chat-send-btn { width:40px; height:40px; background:#007aff; border:none; border-radius:50%; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:white; }
.chat-send-btn:hover { background:#3395ff; }
.chat-send-btn:disabled { background:#333; cursor:not-allowed; }
.chat-bubble-wrap { display:flex; }
.chat-bubble-wrap.user { justify-content:flex-end; }
.chat-bubble-wrap.assistant { justify-content:flex-start; }
.chat-bubble { max-width:75%; padding:10px 14px; font-size:13px; line-height:1.6; white-space:pre-wrap; word-break:break-word; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
.chat-bubble.user { background:#007aff; color:white; border-radius:18px 18px 4px 18px; }
.chat-bubble.assistant { background:#2a2a2a; color:white; border-radius:18px 18px 18px 4px; }
.chat-bubble.error { background:#3a1a1a; color:#ff5f56; border-radius:18px 18px 18px 4px; }

</style>
</head>
<body>

<div class="top-bar">
  <div class="top-left">
    <img id="apple-icon" src="./apple.png" alt="Apple">
    <strong>MacOS 26</strong>
  </div>
  <div id="clock">00:00</div>
</div>

<div id="desktop"></div>

<div class="dock">
  <div class="dock-icon" title="Finder" onclick="openFinder()"><img src="./images/Finder.png"></div>
  <div class="dock-icon" title="Safari" onclick="openApp('Safari','https://www.apple.com/safari/','./images/Safari.png')"><img src="./images/Safari.png"></div>
  <div class="dock-icon" title="YouTube" onclick="openApp('YouTube','https://www.youtube.com/','./images/YouTube.png')"><img src="./images/YouTube.png"></div>
  <div class="dock-icon" title="ChatGPT" onclick="openApp('ChatGPT','gpt.html','./images/ChatGPT.png')"><img src="./images/ChatGPT.png"></div>
  <div class="dock-icon" title="Terminal" onclick="openApp('Terminal','./games/terminal.html','./images/Terminal.png')"><img src="./images/Terminal.png"></div>
  <div class="dock-icon" title="Apple Music" onclick="openApp('Apple Music','https://music.apple.com/','./images/AppleMusic.png')"><img src="./images/AppleMusic.png"></div>
  <div class="dock-icon" title="Settings" onclick="openApp('Settings','./settings.html','./images/Settings.png')"><img src="./images/Settings.png"></div>
  <div class="dock-icon" title="Ampler Launcher" onclick="openApp('Ampler Launcher','https://ampler-launcher.wasmer.app/','./images/Ampler.png')"><img src="./images/Ampler.png"></div>
</div>

<script>
let windowZ = 100;
const finderIcon = "./images/Finder.png";
const chatHistories = {};

function createWindow(title, contentHtml, iconUrl=finderIcon, w=600, h=450){
  windowZ++;
  const win = document.createElement("div");
  win.className="window";
  win.style.zIndex=windowZ;
  win.style.width=w+"px"; win.style.height=h+"px";
  win.style.left=(80+Math.random()*80)+"px"; win.style.top=(50+Math.random()*60)+"px";
  win.innerHTML=`
  <div class="window-header">
    <div class="traffic-lights">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
    </div>
    <div class="window-title">${title}</div>
  </div>
  <div class="window-content">${contentHtml}</div>`;
  document.getElementById("desktop").appendChild(win);

  const header = win.querySelector(".window-header");
  win.querySelector(".red").onclick=(e)=>{e.stopPropagation(); win.remove();};
  win.querySelector(".yellow").onclick=(e)=>{e.stopPropagation(); toggleFullscreen(win);};
  win.querySelector(".green").onclick=(e)=>{e.stopPropagation(); win.classList.add('minimized');};
  win.onmousedown=()=>{windowZ++; win.style.zIndex=windowZ;};
  initDrag(win, header);
  return win;
}

function initDrag(win, header){
  header.onmousedown=(e)=>{
    if(win.classList.contains('fullscreen')) return;
    let startX=e.clientX, startY=e.clientY;
    let startLeft=win.offsetLeft, startTop=win.offsetTop;
    function doDrag(e){
      let newLeft=startLeft+e.clientX-startX;
      let newTop=startTop+e.clientY-startY;
      const dockHeight=document.querySelector('.dock').offsetHeight;
      const topBarHeight=document.querySelector('.top-bar').offsetHeight;
      const maxLeft=window.innerWidth-win.offsetWidth;
      const maxTop=window.innerHeight-win.offsetHeight-dockHeight;
      win.style.left=Math.max(0,Math.min(maxLeft,newLeft))+"px";
      win.style.top=Math.max(topBarHeight,Math.min(maxTop,newTop))+"px";
    }
    function stopDrag(){document.removeEventListener('mousemove',doDrag);document.removeEventListener('mouseup',stopDrag);}
    document.addEventListener('mousemove',doDrag);
    document.addEventListener('mouseup',stopDrag);
  };
}

function toggleFullscreen(win){
  const dockHeight=document.querySelector('.dock').offsetHeight;
  const topBarHeight=document.querySelector('.top-bar').offsetHeight;
  if(!win.classList.contains('fullscreen')){
    win.dataset.prevWidth=win.style.width;
    win.dataset.prevHeight=win.style.height;
    win.dataset.prevLeft=win.style.left;
    win.dataset.prevTop=win.style.top;
    win.style.width=window.innerWidth+"px";
    win.style.height=(window.innerHeight-dockHeight-topBarHeight)+"px";
    win.style.top=topBarHeight+"px";
    win.style.left="0px";
    win.classList.add('fullscreen');
  } else {
    win.style.width=win.dataset.prevWidth;
    win.style.height=win.dataset.prevHeight;
    win.style.left=win.dataset.prevLeft;
    win.style.top=win.dataset.prevTop;
    win.classList.remove('fullscreen');
  }
}

function openApp(title,url,icon,w,h){
  createWindow(title, `<iframe src="${url}" style="width:100%;height:100%;border:none;"></iframe>`, icon, w, h);
}

function openFinder(){
  const apps=[
    {name:'Terminal',icon:'./images/Terminal.png',url:'./terminal.html'},
    {name:'Steam',icon:'./images/Steam.png',url:'./steam.html'},
    {name:'Safari',icon:'./images/Safari.png',url:'https://www.apple.com/safari/'},
    {name:'YouTube',icon:'./images/YouTube.png',url:'./yt.html'},
    {name:'ChatGPT',icon:'./images/ChatGPT.png',url:'gpt.html'},
    {name:'Apple Music',icon:'./images/Music.png',url:'https://freefy.app'},
    {name:'Settings',icon:'./images/Settings.png',url:'./settings.html'},
    {name:'Ampler Launcher',icon:'./images/Ampler.png',url:'https://ampler-launcher.wasmer.app/'},
  ];
  let html='<div class="finder-grid">';
  apps.forEach(a=>{html+=`<div class="finder-item" onclick="openApp('${a.name}','${a.url}','${a.icon}')"><img src="${a.icon}">${a.name}</div>`;});
  html+='</div>';
  createWindow("Finder",html,finderIcon,800,500);
}

// Clock
function updateTime(){const now=new Date();document.getElementById("clock").innerText=now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});}
setInterval(updateTime,1000); updateTime();
window.onload=()=>{openFinder();};
</script>
</body>
</html>
