<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacOS 26</title>
<link rel="icon" href="./apple.png">
<style>
/* ----------------- General ----------------- */
body, html {
  margin:0; padding:0; width:100%; height:100%;
  overflow:hidden;
  font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  background: url('Macbg.jpg') center/cover no-repeat;
  user-select:none; -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none;
}

/* ----------------- Top Nav ----------------- */
#top-nav {
  position: fixed; top:0; left:0; right:0; height:40px;
  background: rgba(28,28,30,0.95);
  display:flex; align-items:center; padding:0 15px; z-index:1000;
}
#top-nav img { width:20px; height:20px; margin-right:8px; }
#top-nav span { color:#fff; font-weight:bold; font-size:14px; }

/* ----------------- Dock ----------------- */
#dock {
  position: fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background: rgba(28,28,30,0.85);
  padding:10px 20px;
  border-radius:20px;
  display:flex; gap:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
  z-index:1000;
  transition: all 0.3s ease;
}
.dock-app {
  width:60px; height:60px;
  transition: transform 0.2s ease;
  cursor:pointer;
  border-radius: 12px;
}
.dock-app:hover {
  transform: scale(1.4) translateY(-10px);
}

/* ----------------- Finder (Desktop) ----------------- */
#finder {
  position: absolute;
  top:50px; left:0; right:0; bottom:100px;
  /* No flex — items are absolutely positioned freely */
}
.finder-app {
  width:90px; text-align:center;
  cursor:pointer; position:absolute;
  transition: transform 0.2s ease, left 0.15s ease, top 0.15s ease;
  padding:6px; border-radius:8px;
}
.finder-app:hover { background: rgba(255,255,255,0.15); }
.finder-app.selected { background: rgba(0,122,255,0.45); }
.finder-app img { width:56px; height:56px; pointer-events:none; }
.finder-app span {
  display:block; margin-top:4px; font-size:11px; color:#fff;
  text-shadow:0 1px 3px rgba(0,0,0,0.8);
  line-height:1.3; word-break:break-word;
}

/* ----------------- Window ----------------- */
.window {
  position:absolute;
  min-width:400px; min-height:250px;
  background: rgba(30,30,32,0.97);
  border-radius:10px; overflow:hidden;
  display:flex; flex-direction:column;
  box-shadow: 0 15px 40px rgba(0,0,0,0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.window.maximized {
  top:40px !important; left:0 !important;
  width:100% !important; height: calc(100vh - 40px) !important;
  border-radius:0;
}
.window.minimized {
  transform: scale(0.1);
  opacity:0;
  pointer-events:none;
  transition: all 0.3s ease;
}
.window-header {
  height:38px; background: rgba(50,50,52,0.98);
  display:flex; align-items:center; padding:0 12px;
  cursor:default; flex-shrink:0;
}
.window-header .title {
  color:#fff; margin-left:10px; font-size:13px;
  flex:1; text-align:center; pointer-events:none;
}
.traffic-lights { display:flex; gap:8px; flex-shrink:0; }
.traffic {
  width:12px; height:12px; border-radius:50%;
  cursor:pointer; position:relative;
  transition: filter 0.15s ease;
}
.traffic:hover { filter: brightness(1.2); }
.traffic:active { filter: brightness(0.9); }
.red { background:#ff5f56; border:1px solid #e0443e; }
.yellow { background:#ffbd2e; border:1px solid #dea123; }
.green { background:#27c93f; border:1px solid #1aab29; }
.traffic .icon {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-size:8px; color:rgba(0,0,0,0.6); opacity:0;
  transition: opacity 0.15s ease;
}
.traffic-lights:hover .traffic .icon { opacity:1; }
.window-body { flex:1; overflow:hidden; }
.window-body iframe { width:100%; height:100%; border:none; display:block; }

</style>
</head>
<body>

<!-- Top Nav -->
<div id="top-nav">
  <img src="./apple.png" alt="Apple">
  <span>Finder</span>
</div>

<!-- Finder (Desktop) -->
<div id="finder"></div>

<!-- Dock -->
<div id="dock"></div>

<!-- Windows container -->
<div id="windows-container"></div>

<script>
// ============ CONFIG ============
const appsList = [
  { name:'Safari',          url:'./Safari.html',    icon:'./images/Safari.png',   w:900, h:600 },
  { name:'YouTube',         url:'./yt.html',        icon:'./images/YouTube.png',  w:960, h:640 },
  { name:'ChatGPT',         url:'./GPT.html',       icon:'./images/ChatGPT.png',  w:800, h:560 },
  { name:'Settings',        url:'index.html',       icon:'./images/Settings.png', w:680, h:480 },
  { name:'Ampler Launcher', url:'https://ampler-launcher.wasmer.app/', icon:'./images/Ampler.png', w:800, h:550 },
  { name:'Terminal',        url:'./terminal.html',  icon:'./images/Terminal.png', w:700, h:420 },
  { name:'Apple Music',     url:'https://freefy.app', icon:'./images/Music.png',  w:900, h:600 },
  { name:'Steam Library',   url:'./steam.html',     icon:'./images/Steam.png',    w:960, h:640 }
];

const finder = document.getElementById('finder');
const dock = document.getElementById('dock');
const windowsContainer = document.getElementById('windows-container');
let topZ = 100;
let openWindows = [];

// ============ BUILD FINDER & DOCK ============
appsList.forEach((app, i) => {
  // --- Finder icon ---
  const f = document.createElement('div');
  f.className = 'finder-app';
  // Grid-like layout: 4 columns, 120px apart
  const col = i % 4;
  const row = Math.floor(i / 4);
  f.style.left = (30 + col * 110) + 'px';
  f.style.top  = (20 + row * 110) + 'px';
  f.innerHTML = `<img src="${app.icon}" alt="${app.name}"><span>${app.name}</span>`;
  f.addEventListener('click', (e) => {
    if (e.detail === 2) openWindow(app);          // double-click to open
    document.querySelectorAll('.finder-app').forEach(el => el.classList.remove('selected'));
    f.classList.add('selected');
  });
  finder.appendChild(f);

  // --- Dock icon ---
  const d = document.createElement('img');
  d.src = app.icon;
  d.alt = app.name;
  d.className = 'dock-app';
  d.title = app.name;
  d.addEventListener('click', () => openWindow(app));
  dock.appendChild(d);
});

// ============ DRAG FINDER ICONS ============
let dragApp = null, dragOffX = 0, dragOffY = 0, wasDragged = false;
const TOP_BAR = 40, DOCK_ZONE = 110;

document.querySelectorAll('.finder-app').forEach(el => {
  el.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    dragApp = el;
    wasDragged = false;
    const rect = el.getBoundingClientRect();
    dragOffX = e.clientX - rect.left;
    dragOffY = e.clientY - rect.top;
    el.style.transition = 'none';
    el.style.zIndex = 50;
  });
});

document.addEventListener('mousemove', (e) => {
  if (!dragApp) return;
  wasDragged = true;
  let x = e.clientX - dragOffX;
  let y = e.clientY - dragOffY;
  const maxX = window.innerWidth - dragApp.offsetWidth;
  const maxY = window.innerHeight - dragApp.offsetHeight - DOCK_ZONE;
  dragApp.style.left = Math.min(Math.max(0, x), maxX) + 'px';
  dragApp.style.top  = Math.max(TOP_BAR, Math.min(y, maxY)) + 'px';
});

document.addEventListener('mouseup', () => {
  if (dragApp) {
    dragApp.style.transition = '';
    dragApp.style.zIndex = '';
    dragApp = null;
  }
});

// ============ OPEN WINDOW ============
function openWindow(app) {
  // Bring existing instance to front if already open
  const existing = openWindows.find(w => w.dataset.url === app.url);
  if (existing) {
    existing.classList.remove('minimized');
    bringToFront(existing);
    return;
  }

  const w = document.createElement('div');
  w.className = 'window';
  w.dataset.url = app.url;
  w.style.width  = (app.w || 800) + 'px';
  w.style.height = (app.h || 500) + 'px';
  // Center
  w.style.left = Math.max(0, (window.innerWidth  - (app.w || 800)) / 2) + 'px';
  w.style.top  = Math.max(TOP_BAR, (window.innerHeight - (app.h || 500) - DOCK_ZONE) / 2) + 'px';
  bringToFront(w);

  w.innerHTML = `
    <div class="window-header">
      <div class="traffic-lights">
        <div class="traffic red" title="Close">
          <span class="icon">✕</span>
        </div>
        <div class="traffic yellow" title="Minimize">
          <span class="icon">−</span>
        </div>
        <div class="traffic green" title="Fullscreen">
          <span class="icon">⤢</span>
        </div>
      </div>
      <div class="title">${app.name}</div>
      <div style="width:44px;"></div>
    </div>
    <div class="window-body">
      <iframe src="${app.url}"></iframe>
    </div>
  `;

  // --- Traffic light actions ---
  w.querySelector('.red').addEventListener('click', (e) => {
    e.stopPropagation();
    closeWindow(w);
  });
  w.querySelector('.yellow').addEventListener('click', (e) => {
    e.stopPropagation();
    w.classList.toggle('minimized');
  });
  w.querySelector('.green').addEventListener('click', (e) => {
    e.stopPropagation();
    w.classList.toggle('maximized');
  });

  windowsContainer.appendChild(w);
  openWindows.push(w);
  initWindowDrag(w);
}

// ============ WINDOW MANAGEMENT ============
function bringToFront(w) {
  w.style.zIndex = ++topZ;
}

function closeWindow(w) {
  w.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
  w.style.transform = 'scale(0.9)';
  w.style.opacity = '0';
  setTimeout(() => {
    w.remove();
    openWindows = openWindows.filter(x => x !== w);
  }, 200);
}

// Click on window to bring to front
windowsContainer.addEventListener('mousedown', (e) => {
  const win = e.target.closest('.window');
  if (win) bringToFront(win);
});

// ============ WINDOW DRAGGING ============
function initWindowDrag(win) {
  const header = win.querySelector('.window-header');
  let dragging = false, offX = 0, offY = 0;

  header.addEventListener('mousedown', (e) => {
    if (e.target.closest('.traffic')) return; // don't drag when clicking traffic lights
    if (win.classList.contains('maximized')) return;
    dragging = true;
    const rect = win.getBoundingClientRect();
    offX = e.clientX - rect.left;
    offY = e.clientY - rect.top;
    win.style.transition = 'none';
    bringToFront(win);
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    let x = e.clientX - offX;
    let y = e.clientY - offY;
    // Keep title bar visible
    y = Math.max(TOP_BAR - 10, Math.min(y, window.innerHeight - 40));
    x = Math.max(-win.offsetWidth + 100, Math.min(x, window.innerWidth - 100));
    win.style.left = x + 'px';
    win.style.top  = y + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (dragging) {
      dragging = false;
      win.style.transition = '';
    }
  });
}

// ============ CLICK DESKTOP TO DESELECT ============
finder.addEventListener('click', (e) => {
  if (e.target === finder) {
    document.querySelectorAll('.finder-app').forEach(el => el.classList.remove('selected'));
  }
});
</script>

</body>
</html>
