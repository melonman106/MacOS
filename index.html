<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MacOS 26</title>
  <style>
    :root {
      --mac-blur: blur(20px);
      --window-bg: rgba(28, 28, 30, 0.85);
      --border-radius: 12px;
    }

    body, html {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: url("Macbg.jpg") center/cover no-repeat fixed;
      background-color: #1a1a1a;
    }

    /* TOP BAR */
    .top-bar {
      height: 28px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: var(--mac-blur);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 15px;
      font-size: 13px;
      color: white;
      z-index: 10000;
      box-shadow: 0 1px 5px rgba(0,0,0,0.2);
    }

    .top-left { display: flex; align-items: center; gap: 8px; }

    /* Fixed Apple icon - never changes */
    #apple-icon { width: 18px; height: 18px; object-fit: contain; }

    /* WINDOW SYSTEM */
    .window {
      position: absolute;
      width: 600px;
      height: 450px;
      background: var(--window-bg);
      border-radius: var(--border-radius);
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      border: 0.5px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: var(--mac-blur);
      overflow: hidden;
      transition: opacity 0.2s, transform 0.2s;
    }

    .window.maximized {
      width: 100% !important;
      height: calc(100% - 28px) !important;
      top: 28px !important;
      left: 0 !important;
      border-radius: 0;
    }

    .window.minimized {
      transform: scale(0.8) translateY(500px);
      opacity: 0;
      pointer-events: none;
    }

    .window-header {
      height: 38px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      cursor: default;
      user-select: none;
      background: rgba(255,255,255,0.05);
    }

    .traffic-lights { display: flex; gap: 8px; width: 60px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; border: none; }
    .red { background: #ff5f56; }
    .yellow { background: #ffbd2e; }
    .green { background: #27c93f; }

    .window-title { flex: 1; text-align: center; color: rgba(255,255,255,0.8); font-size: 13px; font-weight: 500; margin-right: 60px; }
    .window-content { flex: 1; background: white; position: relative; }
    iframe { border: none; width: 100%; height: 100%; border-radius: 0 0 var(--border-radius) var(--border-radius); }

    /* DOCK */
    .dock {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: var(--mac-blur);
      padding: 6px;
      border-radius: 18px;
      display: flex;
      gap: 10px;
      border: 0.5px solid rgba(255, 255, 255, 0.3);
      z-index: 10001;
    }

    .dock-icon {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .dock-icon img { width: 90%; height: 90%; object-fit: contain; }
    .dock-icon:hover { transform: scale(1.3) translateY(-10px); }

    /* FINDER GRID */
    .finder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 20px;
      padding: 25px;
      background: #1e1e1e;
      height: 100%;
      box-sizing: border-box;
    }
    .finder-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      padding: 10px;
      border-radius: 10px;
    }
    .finder-item:hover { background: rgba(255,255,255,0.1); }
    .finder-item img { width: 48px; height: 48px; margin-bottom: 8px; object-fit: contain; }

  </style>
</head>
<body>

<div class="top-bar">
  <div class="top-left">
    <!-- This now always shows apple.png and never changes -->
    <img id="apple-icon" src="apple.png" alt="Apple">
    <strong>MacOS 26</strong>
  </div>
  <div id="clock">00:00</div>
</div>

<div id="desktop"></div>

<div class="dock">
  <div class="dock-icon" title="Finder" onclick="openFinder()"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b9/Finder_Icon_macOS_Tahoe.png"></div>
  <div class="dock-icon" title="Safari" onclick="openSafari()"><img src="https://cdn-icons-png.flaticon.com/128/16566/16566102.png"></div>
  <div class="dock-icon" title="YouTube" onclick="openYouTube()"><img src="https://cdn-icons-png.flaticon.com/128/1384/1384060.png"></div>
  <div class="dock-icon" title="Steam" onclick="openApp('Steam', './steam.html', './steam.ico')"><img src="./steam.ico"></div>
  <div class="dock-icon" title="ChatGPT" onclick="openChatGPT()"><img src="https://cdn-icons-png.flaticon.com/128/12222/12222560.png"></div>
</div>

<script>
let windowZ = 100;
const finderIcon = "https://upload.wikimedia.org/wikipedia/commons/b/b9/Finder_Icon_macOS_Tahoe.png";

function createWindow(title, contentHtml, iconUrl = finderIcon) {
    windowZ++;
    const win = document.createElement("div");
    win.className = "window";
    win.style.zIndex = windowZ;
    win.style.left = (100 + Math.random() * 40) + "px";
    win.style.top = (60 + Math.random() * 40) + "px";

    win.innerHTML = `
      <div class="window-header">
        <div class="traffic-lights">
          <div class="dot red"></div>
          <div class="dot yellow" title="Fullscreen"></div>
          <div class="dot green" title="Minimize"></div>
        </div>
        <div class="window-title">${title}</div>
      </div>
      <div class="window-content">${contentHtml}</div>
    `;

    document.getElementById("desktop").appendChild(win);

    win.querySelector(".red").onclick = (e) => { e.stopPropagation(); win.remove(); };
    win.querySelector(".yellow").onclick = (e) => { e.stopPropagation(); win.classList.toggle("maximized"); };
    win.querySelector(".green").onclick = (e) => { e.stopPropagation(); win.classList.add("minimized"); };

    // Removed the active-app-icon update from here — apple.png stays fixed
    win.onmousedown = () => {
        windowZ++;
        win.style.zIndex = windowZ;
    };

    initDrag(win);
    return win;
}

function initDrag(win) {
    const header = win.querySelector(".window-header");
    header.onmousedown = (e) => {
        if (win.classList.contains('maximized')) return;
        let startX = e.clientX;
        let startY = e.clientY;
        let startLeft = win.offsetLeft;
        let startTop = win.offsetTop;

        function doDrag(e) {
            win.style.left = (startLeft + e.clientX - startX) + "px";
            win.style.top = (startTop + e.clientY - startY) + "px";
        }

        function stopDrag() {
            document.removeEventListener('mousemove', doDrag);
            document.removeEventListener('mouseup', stopDrag);
        }

        document.addEventListener('mousemove', doDrag);
        document.addEventListener('mouseup', stopDrag);
    };
}

const openApp = (title, url, icon) => createWindow(title, `<iframe src="${url}"></iframe>`, icon);

function openSafari() {
    openApp('Safari', 'https://browser.rammerhead.org/', 'https://cdn-icons-png.flaticon.com/128/16566/16566102.png');
}

function openYouTube() {
    openApp('YouTube', './yt.html', 'https://cdn-icons-png.flaticon.com/128/1384/1384060.png');
}

function openFinder() {
    const html = `
    <div class="finder-grid">
        <div class="finder-item" onclick="openApp('Terminal', 'games/terminal.html', 'https://upload.wikimedia.org/wikipedia/commons/6/68/Terminalicon3.png')"><img src="https://cdn-icons-png.flaticon.com/128/1162/1162539.png">Terminal</div>
        <div class="finder-item" onclick="openApp('Steam', './steam.html', './steam.ico')"><img src="./steam.ico">Steam</div>
        <div class="finder-item" onclick="openSafari()"><img src="https://cdn-icons-png.flaticon.com/128/16566/16566102.png">Safari</div>
        <div class="finder-item" onclick="openYouTube()"><img src="https://cdn-icons-png.flaticon.com/128/1384/1384060.png">YouTube</div>
        <div class="finder-item" onclick="openChatGPT()"><img src="https://cdn-icons-png.flaticon.com/128/12222/12222560.png">ChatGPT</div>
    </div>`;
    createWindow("Finder", html, finderIcon);
}

function openChatGPT() {
    const html = `<div style="padding:20px; background:#1e1e1e; height:100%; color:white; font-size:14px;">ChatGPT is ready. Type your message below...</div>`;
    createWindow("ChatGPT", html, 'https://cdn-icons-png.flaticon.com/128/12222/12222560.png');
}

// Update Clock
function updateTime() {
    const now = new Date();
    document.getElementById("clock").innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
setInterval(updateTime, 1000);
updateTime();

window.onload = () => {
    openFinder();
};

document.addEventListener('keydown', (e) => {
    if(e.key === "Escape") document.querySelectorAll('.minimized').forEach(w => w.classList.remove('minimized'));
});
</script>
</body>
</html>
