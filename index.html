<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacOS</title>
<link rel="icon" href="./apple.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body,html{width:100%;height:100%;overflow:hidden;font-family:'Inter',-apple-system,sans-serif;user-select:none;-webkit-user-select:none}
body{background:url('Macbg.jpg') center/cover no-repeat;background-size:cover!important;background-position:center!important;background-repeat:no-repeat!important}

#top-bar{position:fixed;top:0;left:0;right:0;height:25px;background:rgba(30,30,30,0.72);backdrop-filter:blur(30px) saturate(180%);display:flex;align-items:center;justify-content:space-between;padding:0;z-index:1000;border-bottom:0.5px solid rgba(255,255,255,0.1)}
.top-left,.top-right{display:flex;align-items:center;height:100%}
.top-logo{display:flex;align-items:center;justify-content:center;height:100%;width:36px;cursor:pointer}
.top-logo:hover{background:rgba(255,255,255,0.12)}
.top-logo img{width:12px;height:14px}
.top-app{color:#fff;font-weight:600;font-size:13px;padding:0 10px;height:100%;display:flex;align-items:center;cursor:default}
.top-app:hover{background:rgba(255,255,255,0.08)}
.top-item{color:rgba(255,255,255,0.85);font-size:13px;padding:0 10px;height:100%;display:flex;align-items:center;cursor:default;position:relative}
.top-item:hover{background:rgba(255,255,255,0.12);color:#fff}
.top-icon{display:flex;align-items:center;justify-content:center;height:100%;width:32px;cursor:default;color:rgba(255,255,255,0.85)}
.top-icon:hover{background:rgba(255,255,255,0.12)}
.top-icon svg{width:13px;height:13px;fill:currentColor}
.top-clock{color:#fff;font-size:13px;font-weight:500;padding:0 12px;height:100%;display:flex;align-items:center;cursor:default;white-space:nowrap}
.top-clock:hover{background:rgba(255,255,255,0.12)}

.dropdown{position:absolute;top:100%;left:-4px;background:rgba(40,40,42,0.92);backdrop-filter:blur(40px);border-radius:6px;padding:4px 0;min-width:200px;box-shadow:0 10px 35px rgba(0,0,0,0.5),0 0 0 0.5px rgba(255,255,255,0.12);z-index:9999;display:none;overflow:hidden}
.dropdown.show{display:block}
.dd-item{padding:4px 16px;font-size:13px;color:#fff;cursor:default;white-space:nowrap}
.dd-item:hover{background:rgba(0,122,255,0.85)}
.dd-sep{height:1px;background:rgba(255,255,255,0.1);margin:4px 0}

#finder{position:absolute;top:25px;left:0;right:0;bottom:80px}
.icon{width:90px;text-align:center;cursor:pointer;position:absolute;padding:8px 6px;border-radius:8px}
.icon:hover{background:rgba(255,255,255,0.15)}
.icon.selected{background:rgba(0,122,255,0.4)}
.icon img{width:56px;height:56px;pointer-events:none}
.icon span{display:block;margin-top:5px;font-size:11px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.9);line-height:1.3}

#dock{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);background:rgba(28,28,30,0.72);backdrop-filter:blur(25px) saturate(150%);padding:4px 10px;border-radius:16px;display:flex;gap:6px;align-items:flex-end;box-shadow:0 8px 30px rgba(0,0,0,0.4);z-index:1000;border:0.5px solid rgba(255,255,255,0.12);transition:all 0.3s ease}
.dock-icon{width:50px;height:50px;cursor:pointer;border-radius:11px;position:relative;transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1),margin 0.25s}
.dock-icon:hover{transform:scale(1.55) translateY(-14px);margin:0 8px}
.dock-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.6);margin:2px auto 0}
.dock-tip{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:rgba(30,30,30,0.92);color:#fff;font-size:12px;padding:4px 10px;border-radius:5px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.15s;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.dock-icon:hover .dock-tip{opacity:1}
.dock-sep{width:1px;height:36px;background:rgba(255,255,255,0.2);align-self:center;margin:0 3px}

#win-box{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none}
.win{position:absolute;min-width:320px;min-height:200px;background:rgba(30,30,32,0.97);backdrop-filter:blur(30px);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 50px rgba(0,0,0,0.5),0 0 0 0.5px rgba(255,255,255,0.1);pointer-events:auto;transition:border-radius 0.25s}
/* UPDATED FULLSCREEN STYLING - now starts below the top bar */
.win.fullscreen{
  top:25px!important; /* Start below the top bar */
  left:0!important;
  width:100%!important;
  height:calc(100% - 25px)!important; /* Subtract top bar height */
  border-radius:0;
}
.win.minimized{transform:scale(0.1);opacity:0;pointer-events:none}
.win-bar{height:40px;background:rgba(50,50,52,0.98);display:flex;align-items:center;padding:0 14px;cursor:default;flex-shrink:0;border-bottom:1px solid rgba(0,0,0,0.3)}
.win-bar .title{color:rgba(255,255,255,0.9);margin-left:8px;font-size:13px;font-weight:500;flex:1;text-align:center;pointer-events:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lights{display:flex;gap:8px;flex-shrink:0}
.lt{width:12px;height:12px;border-radius:50%;cursor:pointer;position:relative}
.lt.r{background:#ff5f57;border:1px solid #e0443e}
.lt.y{background:#febc2e;border:1px solid #dea123}
.lt.g{background:#28c840;border:1px solid #1aab29}
.lt i{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;color:rgba(0,0,0,0.55);opacity:0;font-weight:bold;font-style:normal}
.lights:hover .lt i{opacity:1}
.win-body{flex:1;overflow:hidden}
.win-body iframe{width:100%;height:100%;border:none;display:block}

#spot-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:9999;display:none;align-items:flex-start;justify-content:center;padding-top:18vh;backdrop-filter:blur(8px)}
#spot-bg.show{display:flex}
#spot-box{width:640px;max-width:90vw;background:rgba(40,40,42,0.95);border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.6),0 0 0 0.5px rgba(255,255,255,0.15)}
#spot-in{width:100%;padding:16px 20px;background:transparent;border:none;outline:none;color:#fff;font-size:22px;font-weight:300;font-family:inherit;border-bottom:1px solid rgba(255,255,255,0.08)}
#spot-in::placeholder{color:rgba(255,255,255,0.3)}
#spot-out{max-height:300px;overflow-y:auto}
.sp-item{padding:10px 20px;display:flex;align-items:center;gap:12px;cursor:default}
.sp-item:hover,.sp-item.on{background:rgba(0,122,255,0.5)}
.sp-item img{width:32px;height:32px;border-radius:6px}
.sp-item span{color:#fff;font-size:14px}

#ctx{position:fixed;background:rgba(40,40,42,0.92);backdrop-filter:blur(40px);border-radius:8px;padding:4px 0;min-width:200px;box-shadow:0 12px 40px rgba(0,0,0,0.5),0 0 0 0.5px rgba(255,255,255,0.12);z-index:9999;display:none;overflow:hidden}
#ctx .cm{padding:4px 16px;font-size:13px;color:#fff;cursor:default}
#ctx .cm:hover{background:rgba(0,122,255,0.85)}
#ctx .cs{height:1px;background:rgba(255,255,255,0.1);margin:4px 0}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(30,30,30,0.92);border:1px solid rgba(255,255,255,0.12);color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;font-weight:500;backdrop-filter:blur(20px);z-index:9999;opacity:0;transition:all 0.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="top-bar">
  <div class="top-left">
    <div class="top-logo" id="apple-logo"><img src="./apple.png" alt=""></div>
    <div class="top-app" id="app-name">Finder</div>
    <div class="top-item" data-menu="file">File
      <div class="dropdown">
        <div class="dd-item" onclick="openApp(0);closeDD()">New Window</div>
        <div class="dd-sep"></div>
        <div class="dd-item" style="color:rgba(255,255,255,0.3)">Close</div>
      </div>
    </div>
    <div class="top-item" data-menu="edit">Edit
      <div class="dropdown">
        <div class="dd-item" style="color:rgba(255,255,255,0.3)">Undo</div>
        <div class="dd-sep"></div>
        <div class="dd-item" style="color:rgba(255,255,255,0.3)">Copy</div>
      </div>
    </div>
    <div class="top-item" data-menu="view">View
      <div class="dropdown">
        <div class="dd-item" onclick="toggleDesktop();closeDD()">Show/Hide Desktop</div>
      </div>
    </div>
    <div class="top-item" data-menu="window">Window
      <div class="dropdown">
        <div class="dd-item" onclick="minFront();closeDD()">Minimize</div>
        <div class="dd-item" onclick="toggleFullscreen();closeDD()">Toggle Fullscreen</div>
        <div class="dd-sep"></div>
        <div class="dd-item" onclick="closeAllWins();closeDD()">Close All</div>
      </div>
    </div>
  </div>
  <div class="top-right">
    <div class="top-icon" id="spot-btn" title="Spotlight"><svg viewBox="0 0 24 24"><path d="M10 2a8 8 0 105.3 14.7l4.2 4.2a1 1 0 001.4-1.4l-4.2-4.2A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"/></svg></div>
    <div class="top-icon" id="cc-btn"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h10M4 18h6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div>
    <div class="top-clock" id="clock"></div>
  </div>
</div>

<div id="spot-bg">
  <div id="spot-box">
    <input type="text" id="spot-in" placeholder="Spotlight Search" autocomplete="off">
    <div id="spot-out"></div>
  </div>
</div>

<div id="ctx"></div>
<div id="finder"></div>
<div id="dock"></div>
<div id="win-box"></div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// APPS
// ═══════════════════════════════════════════════════════════════
var APPS = [
  { name:'Safari',   url:'https://randomshenanigans.extraquintanaroo.com/?/',   icon:'./images/Safari.png',   w:900, h:600 },
  { name:'YouTube',  url:'./yt.html',       icon:'./images/YouTube.png',  w:960, h:640 },
  { name:'ChatGPT',  url:'./GPT.html',      icon:'./images/ChatGPT.png',  w:800, h:560 },
  { name:'Settings', url:'./Settings.html',  icon:'./images/Settings.png', w:860, h:580 },
  { name:'Terminal', url:'./terminal.html',  icon:'./images/Terminal.png', w:720, h:440 },
  { name:'Steam',    url:'./steam.html',     icon:'./images/Steam.png',    w:960, h:640 },
  { name:'Music',    url:'https://freefy.app', icon:'./images/Music.png',  w:900, h:600 },
  { name:'Ampler',   url:'https://ampler-launcher.wasmer.app/', icon:'./images/Ampler.png', w:800, h:550 },
];

// ═══════════════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════════════
function load(key, fallback) {
  try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch(e) { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

// Restore wallpaper
(function() {
  var wp = load('wallpaper', null);
  if (wp && typeof wp === 'string') document.body.style.background = wp;
})();

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
var wins = [];
var nextZ = 100;
var pins = load('pins', null);
if (!pins) { pins = {}; APPS.forEach(function(a) { pins[a.url] = true; }); save('pins', pins); }
var iconPos = load('iconpos', {});

// ═══════════════════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════════════════
function updateClock() {
  var d = new Date();
  var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var mons = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var h = d.getHours(), m = String(d.getMinutes()).padStart(2,'0');
  var ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
  document.getElementById('clock').textContent = days[d.getDay()]+' '+mons[d.getMonth()]+' '+d.getDate()+'  '+h+':'+m+' '+ap;
}
updateClock(); setInterval(updateClock, 1000);

// ═══════════════════════════════════════════════════════════════
// DESKTOP ICONS
// ═══════════════════════════════════════════════════════════════
function buildDesktop() {
  var finder = document.getElementById('finder');
  finder.innerHTML = '';
  APPS.forEach(function(app, i) {
    var icon = document.createElement('div');
    icon.className = 'icon';
    icon.dataset.idx = i;
    var p = iconPos[app.url];
    icon.style.left = (p ? p.x : 30 + (i % 4) * 110) + 'px';
    icon.style.top = (p ? p.y : 20 + Math.floor(i / 4) * 110) + 'px';
    var img = document.createElement('img');
    img.src = app.icon; img.draggable = false;
    img.onerror = function() { this.style.background = '#555'; this.src = ''; };
    icon.appendChild(img);
    var label = document.createElement('span');
    label.textContent = app.name;
    icon.appendChild(label);
    icon.addEventListener('click', function(e) {
      if (e.detail === 2) openApp(i);
      document.querySelectorAll('.icon').forEach(function(x) { x.classList.remove('selected'); });
      icon.classList.add('selected');
    });
    finder.appendChild(icon);
  });
  initIconDrag();
}

function initIconDrag() {
  var drag = null, ox = 0, oy = 0;
  document.querySelectorAll('.icon').forEach(function(icon) {
    icon.addEventListener('mousedown', function(e) {
      if (e.button !== 0) return;
      drag = icon; ox = e.clientX - icon.getBoundingClientRect().left; oy = e.clientY - icon.getBoundingClientRect().top;
      icon.style.transition = 'none'; icon.style.zIndex = 50;
    });
  });
  document.addEventListener('mousemove', function(e) {
    if (!drag) return;
    drag.style.left = Math.max(0, Math.min(e.clientX - ox, window.innerWidth - 90)) + 'px';
    drag.style.top = Math.max(25, Math.min(e.clientY - oy, window.innerHeight - 100)) + 'px';
  });
  document.addEventListener('mouseup', function() {
    if (drag) {
      drag.style.transition = ''; drag.style.zIndex = '';
      var idx = parseInt(drag.dataset.idx);
      iconPos[APPS[idx].url] = { x: parseInt(drag.style.left), y: parseInt(drag.style.top) };
      save('iconpos', iconPos);
      drag = null;
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// DOCK
// ═══════════════════════════════════════════════════════════════
function buildDock() {
  var dock = document.getElementById('dock');
  dock.innerHTML = '';
  var openUrls = new Set(wins.map(function(w) { return w.dataset.url; }));
  var pinned = APPS.filter(function(a) { return pins[a.url]; });
  var unpinned = APPS.filter(function(a) { return !pins[a.url] && openUrls.has(a.url); });
  pinned.forEach(function(app) { dock.appendChild(dockItem(app, openUrls.has(app.url))); });
  if (pinned.length && unpinned.length) {
    var sep = document.createElement('div'); sep.className = 'dock-sep'; dock.appendChild(sep);
  }
  unpinned.forEach(function(app) { dock.appendChild(dockItem(app, true)); });
}

function dockItem(app, isOpen) {
  var img = document.createElement('img');
  img.src = app.icon; img.className = 'dock-icon';
  img.onerror = function() { this.style.background = '#444'; this.src = ''; };
  var tip = document.createElement('div'); tip.className = 'dock-tip'; tip.textContent = app.name; img.appendChild(tip);
  if (isOpen) { var dot = document.createElement('div'); dot.className = 'dock-dot'; img.appendChild(dot); }
  var appIdx = APPS.indexOf(app);
  img.addEventListener('click', function(e) {
    if (e.shiftKey) { pins[app.url] = !pins[app.url]; save('pins', pins); buildDock(); return; }
    openApp(appIdx);
  });
  return img;
}

// ═══════════════════════════════════════════════════════════════
// DOCK VISIBILITY — uses inline style for reliability
// ═══════════════════════════════════════════════════════════════
function updateDock() {
  var dock = document.getElementById('dock');
  var anyFullscreen = false;
  for (var i = 0; i < wins.length; i++) {
    if (wins[i].classList.contains('fullscreen')) { anyFullscreen = true; break; }
  }
  if (anyFullscreen) {
    dock.style.opacity = '0';
    dock.style.pointerEvents = 'none';
    dock.style.transform = 'translateX(-50%) translateY(120px)';
  } else {
    dock.style.opacity = '1';
    dock.style.pointerEvents = 'auto';
    dock.style.transform = 'translateX(-50%)';
  }
}

// ═══════════════════════════════════════════════════════════════
// WINDOW MANAGEMENT
// ═══════════════════════════════════════════════════════════════
function setAppName(name) { document.getElementById('app-name').textContent = name || 'Finder'; }

function openApp(idx) {
  var app = APPS[idx]; if (!app) return;
  var existing = wins.find(function(w) { return w.dataset.url === app.url; });
  if (existing) { existing.classList.remove('minimized'); bringFront(existing); return; }
  createWin(app);
}

function createWin(app, saved) {
  saved = saved || {};
  var win = document.createElement('div');
  win.className = 'win';
  win.dataset.url = app.url;
  win.dataset.name = app.name;
  win.dataset.idx = APPS.indexOf(app);
  if (saved.fullscreen) win.classList.add('fullscreen');
  if (saved.min) win.classList.add('minimized');
  var w = saved.w || app.w || 800, h = saved.h || app.h || 500;
  win.style.width = w + 'px'; win.style.height = h + 'px';
  win.style.left = (saved.x != null ? saved.x : Math.max(0, (window.innerWidth - w) / 2)) + 'px';
  win.style.top = (saved.y != null ? saved.y : Math.max(35, (window.innerHeight - h - 85) / 2)) + 'px';
  var z = saved.z || ++nextZ; win.style.zIndex = z; if (z > nextZ) nextZ = z + 1;

  var bar = document.createElement('div'); bar.className = 'win-bar';
  bar.innerHTML = '<div class="lights"><div class="lt r"><i>✕</i></div><div class="lt y"><i>−</i></div><div class="lt g"><i>⤢</i></div></div><div class="title">' + app.name + '</div><div style="width:44px"></div>';
  win.appendChild(bar);

  var body = document.createElement('div'); body.className = 'win-body';
  var iframe = document.createElement('iframe');
  iframe.src = app.url; iframe.allowFullscreen = true;
  body.appendChild(iframe); win.appendChild(body);

  bar.querySelector('.lt.r').addEventListener('click', function(e) { e.stopPropagation(); closeWin(win); });
  bar.querySelector('.lt.y').addEventListener('click', function(e) { e.stopPropagation(); win.classList.toggle('minimized'); saveAll(); });

  // GREEN = FULLSCREEN (UPDATED - now uses toggleFullscreen function)
  bar.querySelector('.lt.g').addEventListener('click', function(e) {
    e.stopPropagation();
    // The toggleFullscreen function now handles everything
    toggleFullscreen(win); // Pass the specific window to toggle
  });

  document.getElementById('win-box').appendChild(win);
  wins.push(win);
  bringFront(win);
  initWinDrag(win);
  setAppName(app.name);
  buildDock();
  updateDock();
  saveAll();
}

function closeWin(win) {
  win.style.transition = 'transform 0.2s, opacity 0.2s';
  win.style.transform = 'scale(0.9)'; win.style.opacity = '0';
  setTimeout(function() {
    win.remove();
    wins = wins.filter(function(w) { return w !== win; });
    var top = topWin(); setAppName(top ? top.dataset.name : null);
    buildDock();
    updateDock(); // Make sure dock is updated when window is closed
    saveAll();
  }, 200);
}

function bringFront(win) { win.style.zIndex = ++nextZ; setAppName(win.dataset.name); }
function topWin() { if (!wins.length) return null; return wins.reduce(function(a, b) { return (parseInt(a.style.zIndex) || 0) > (parseInt(b.style.zIndex) || 0) ? a : b; }); }
function minFront() { var w = topWin(); if (w) { w.classList.toggle('minimized'); saveAll(); } }

// UPDATED toggleFullscreen function to accept an optional window parameter
function toggleFullscreen(winToToggle) {
  // If a specific window is provided, toggle it; otherwise toggle the top window
  var w = winToToggle || topWin();
  if (w) {
    bringFront(w); // Bring window to front when toggling fullscreen
    w.classList.toggle('fullscreen');
    updateDock(); // This is the key function that shows/hides the dock
    saveAll();
  }
}

function closeAllWins() { wins.slice().forEach(function(w) { closeWin(w); }); }

document.getElementById('win-box').addEventListener('mousedown', function(e) {
  var win = e.target.closest('.win');
  if (win) { bringFront(win); saveAll(); }
});

function initWinDrag(win) {
  var bar = win.querySelector('.win-bar'), dragging = false, ox = 0, oy = 0;
  bar.addEventListener('mousedown', function(e) {
    if (e.target.closest('.lt') || win.classList.contains('fullscreen')) return;
    dragging = true; ox = e.clientX - win.getBoundingClientRect().left; oy = e.clientY - win.getBoundingClientRect().top;
    win.style.transition = 'none'; bringFront(win); e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    win.style.left = Math.max(-win.offsetWidth + 100, Math.min(e.clientX - ox, window.innerWidth - 100)) + 'px';
    win.style.top = Math.max(15, Math.min(e.clientY - oy, window.innerHeight - 40)) + 'px';
  });
  document.addEventListener('mouseup', function() { if (dragging) { dragging = false; win.style.transition = ''; saveAll(); } });
}

// ═══════════════════════════════════════════════════════════════
// SAVE & RESTORE
// ═══════════════════════════════════════════════════════════════
function saveAll() {
  var state = wins.map(function(w) {
    return { url: w.dataset.url, name: w.dataset.name, x: parseInt(w.style.left), y: parseInt(w.style.top), w: parseInt(w.style.width), h: parseInt(w.style.height), fullscreen: w.classList.contains('fullscreen'), min: w.classList.contains('minimized'), z: parseInt(w.style.zIndex) || 100 };
  });
  save('savedwins', state);
}

function restoreAll() {
  var state = load('savedwins', []);
  if (!state || !state.length) return;
  state.forEach(function(sw) {
    var app = APPS.find(function(a) { return a.url === sw.url; });
    if (app) createWin(app, sw);
  });
  var top = topWin(); if (top) setAppName(top.dataset.name);
  updateDock(); // Make sure dock is updated after restoring windows
}

window.addEventListener('beforeunload', saveAll);
setInterval(function() { if (wins.length) saveAll(); }, 3000);

// ═══════════════════════════════════════════════════════════════
// MENUS
// ═══════════════════════════════════════════════════════════════
var activeDD = null;
document.querySelectorAll('.top-item[data-menu]').forEach(function(item) {
  var dd = item.querySelector('.dropdown'); if (!dd) return;
  item.addEventListener('click', function(e) { e.stopPropagation(); if (activeDD === dd) { closeDD(); return; } closeDD(); dd.classList.add('show'); activeDD = dd; });
  item.addEventListener('mouseenter', function() { if (activeDD && activeDD !== dd) { closeDD(); dd.classList.add('show'); activeDD = dd; } });
});
function closeDD() { document.querySelectorAll('.dropdown').forEach(function(m) { m.classList.remove('show'); }); activeDD = null; }
document.addEventListener('click', function(e) { if (!e.target.closest('.top-item')) closeDD(); if (!e.target.closest('#ctx')) document.getElementById('ctx').style.display = 'none'; });
document.getElementById('apple-logo').addEventListener('click', function() { openApp(3); });

// ═══════════════════════════════════════════════════════════════
// SPOTLIGHT
// ═══════════════════════════════════════════════════════════════
var spotBg = document.getElementById('spot-bg'), spotIn = document.getElementById('spot-in'), spotOut = document.getElementById('spot-out'), spotIdx = 0;
document.getElementById('spot-btn').addEventListener('click', openSpot);
document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === ' ') { e.preventDefault(); openSpot(); }
  if (e.key === 'Escape') { closeSpot(); closeDD(); document.getElementById('ctx').style.display = 'none'; }
  if ((e.metaKey || e.ctrlKey) && e.key === 'w') { e.preventDefault(); var t = topWin(); if (t) closeWin(t); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'm') { e.preventDefault(); minFront(); }
});
function openSpot() { spotBg.classList.add('show'); spotIn.value = ''; spotIdx = 0; renderSpot(''); setTimeout(function() { spotIn.focus(); }, 50); }
function closeSpot() { spotBg.classList.remove('show'); }
spotBg.addEventListener('click', function(e) { if (e.target === spotBg) closeSpot(); });
spotIn.addEventListener('input', function() { spotIdx = 0; renderSpot(spotIn.value); });
spotIn.addEventListener('keydown', function(e) {
  var items = spotOut.querySelectorAll('.sp-item');
  if (e.key === 'ArrowDown') { e.preventDefault(); spotIdx = Math.min(spotIdx + 1, items.length - 1); updSpot(items); }
  if (e.key === 'ArrowUp') { e.preventDefault(); spotIdx = Math.max(spotIdx - 1, 0); updSpot(items); }
  if (e.key === 'Enter' && items[spotIdx]) items[spotIdx].click();
});
function renderSpot(q) {
  var m = q.trim() ? APPS.filter(function(a) { return a.name.toLowerCase().includes(q.toLowerCase()); }) : APPS;
  spotOut.innerHTML = m.map(function(app, i) {
    return '<div class="sp-item' + (i === spotIdx ? ' on' : '') + '" data-url="' + app.url + '"><img src="' + app.icon + '" onerror="this.style.display=\'none\'"><span>' + app.name + '</span></div>';
  }).join('');
  spotOut.querySelectorAll('.sp-item').forEach(function(el) {
    el.addEventListener('click', function() { var app = APPS.find(function(a) { return a.url === el.dataset.url; }); if (app) { openApp(APPS.indexOf(app)); closeSpot(); } });
  });
}
function updSpot(items) { items.forEach(function(el, i) { el.classList.toggle('on', i === spotIdx); }); }

// ═══════════════════════════════════════════════════════════════
// RIGHT CLICK
// ═══════════════════════════════════════════════════════════════
document.getElementById('finder').addEventListener('contextmenu', function(e) {
  if (!e.target.closest('.icon')) {
    e.preventDefault();
    document.getElementById('ctx').innerHTML = '<div class="cm" onclick="openApp(4);document.getElementById(\'ctx\').style.display=\'none\'">New Terminal Window</div><div class="cs"></div><div class="cm" onclick="toggleDesktop();document.getElementById(\'ctx\').style.display=\'none\'">Toggle Desktop</div><div class="cs"></div><div class="cm" onclick="closeAllWins();document.getElementById(\'ctx\').style.display=\'none\'">Close All Windows</div>';
    document.getElementById('ctx').style.display = 'block';
    document.getElementById('ctx').style.left = Math.min(e.clientX, window.innerWidth - 220) + 'px';
    document.getElementById('ctx').style.top = Math.min(e.clientY, window.innerHeight - 150) + 'px';
  }
});
function toggleDesktop() { var f = document.getElementById('finder'); f.style.display = f.style.display === 'none' ? '' : 'none'; }

// ═══════════════════════════════════════════════════════════════
// MESSAGES
// ═══════════════════════════════════════════════════════════════
window.addEventListener('message', function(e) {
  if (!e.data || !e.data.type) return;
  if (e.data.type === 'openWindow') {
    var url = e.data.url;
    var appIdx = APPS.findIndex(function(a) { return a.url === url; });
    if (appIdx >= 0) { openApp(appIdx); }
    else { createWin({ name: e.data.title || 'App', url: url, icon: e.data.icon || './images/Terminal.png', w: e.data.w || 900, h: e.data.h || 600 }); }
    toast('Launched: ' + (e.data.title || 'App'));
  }
  if (e.data.type === 'setWallpaper') {
    var bg = e.data.wallpaper;
    save('wallpaper', bg);
    document.body.style.background = bg;
    toast('Wallpaper updated');
  }
});

// ═══════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
buildDesktop();
buildDock();
restoreAll();
</script>
</body>
</html>
