<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>macOS 26</title>
<link rel="icon" href="./apple.png">
<style>
:root {
  --mac-red: #ff5f56;
  --mac-yellow: #ffbd2e;
  --mac-green: #27c93f;
  --dock-height: 70px;
  --dock-padding: 8px;
  --dock-gap: 10px;
  --window-border-radius: 12px;
  --transition-speed: 0.25s;
}

* { box-sizing: border-box; margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif; }

body, html {
  width: 100vw; height: 100vh;
  overflow: hidden;
  background: url('Macbg.jpg') center/cover no-repeat;
}

/* Top Menu Bar */
#topbar {
  position: fixed; top:0; left:0; width:100%; height:28px;
  background: rgba(20,20,20,0.85);
  display:flex; justify-content:space-between; align-items:center;
  padding:0 10px; color:#fff; font-size:12px; z-index:1000;
  backdrop-filter: blur(10px);
}
#topbar-left, #topbar-right { display:flex; align-items:center; gap:8px; }

/* Dock */
#dock {
  position: fixed; bottom:0; left:50%;
  transform: translateX(-50%);
  height: var(--dock-height);
  display:flex; align-items:center; justify-content:center;
  gap: var(--dock-gap);
  padding: var(--dock-padding);
  background: rgba(15,15,15,0.5);
  border-radius: 20px 20px 0 0;
  backdrop-filter: blur(20px);
  z-index: 999;
}

.dock-app {
  width: 60px; height: 60px;
  display:flex; align-items:center; justify-content:center;
  border-radius: 16px;
  cursor:pointer;
  transition: transform var(--transition-speed), filter var(--transition-speed);
}

.dock-app:hover {
  transform: scale(1.2);
  filter: brightness(1.3);
}

.dock-app img { width: 60%; height: 60%; pointer-events:none; }

/* Windows */
.window {
  position: absolute;
  background: #1c1c1e;
  border-radius: var(--window-border-radius);
  border:1px solid rgba(255,255,255,0.1);
  overflow: hidden;
  display:none;
  flex-direction: column;
  box-shadow:0 20px 50px rgba(0,0,0,0.7);
  transition: all var(--transition-speed);
  z-index: 900;
}

.window-header {
  height: 32px; display:flex; align-items:center;
  padding: 0 10px; background: rgba(30,30,30,0.85);
  cursor: grab;
}

.window-header .traffic {
  display:flex; gap:6px;
  margin-right: auto;
}

.traffic div {
  width:12px; height:12px;
  border-radius:50%;
  cursor:pointer;
}

.traffic .close { background: var(--mac-red);}
.traffic .fullscreen { background: var(--mac-yellow);}
.traffic .minimize { background: var(--mac-green);}

.window-content {
  flex:1; overflow:auto;
}

iframe { width:100%; height:100%; border:none; }

/* Animations */
@keyframes scaleUp { from {transform: scale(0.8); opacity:0;} to {transform:scale(1); opacity:1;} }
.window.show { display:flex; animation: scaleUp 0.2s ease forwards; }

</style>
</head>
<body>

<!-- Top Nav -->
<div id="topbar">
  <div id="topbar-left"> Finder</div>
  <div id="topbar-right">Wed 17 Mar 10:26 AM</div>
</div>

<!-- Dock -->
<div id="dock">
  <div class="dock-app" data-app="Finder"><img src="./images/Finder.png"></div>
  <div class="dock-app" data-app="Safari"><img src="./images/Safari.png"></div>
  <div class="dock-app" data-app="YouTube"><img src="./images/YouTube.png"></div>
  <div class="dock-app" data-app="ChatGPT"><img src="./images/ChatGPT.png"></div>
  <div class="dock-app" data-app="Settings"><img src="./images/Settings.png"></div>
  <div class="dock-app" data-app="Ampler"><img src="./images/Ampler.png"></div>
  <div class="dock-app" data-app="Terminal"><img src="./images/Terminal.png"></div>
  <div class="dock-app" data-app="Music"><img src="./images/Music.png"></div>
  <div class="dock-app" data-app="Steam"><img src="./images/Steam.png"></div>
</div>

<!-- Windows -->
<div class="window" id="Finder"><div class="window-header">
  <div class="traffic"><div class="close"></div><div class="fullscreen"></div><div class="minimize"></div></div>
  <span>Finder</span>
</div><div class="window-content"><h2>Finder</h2><p>Your files go here.</p></div></div>

<div class="window" id="Safari"><div class="window-header">
  <div class="traffic"><div class="close"></div><div class="fullscreen"></div><div class="minimize"></div></div>
  <span>Safari</span>
</div><div class="window-content"><iframe src="./Safari.html"></iframe></div></div>

<div class="window" id="YouTube"><div class="window-header">
  <div class="traffic"><div class="close"></div><div class="fullscreen"></div><div class="minimize"></div></div>
  <span>YouTube</span>
</div><div class="window-content"><iframe src="./yt.html"></iframe></div></div>

<div class="window" id="ChatGPT"><div class="window-header">
  <div class="traffic"><div class="close"></div><div class="fullscreen"></div><div class="minimize"></div></div>
  <span>ChatGPT</span>
</div><div class="window-content"><iframe src="./GPT.html"></iframe></div></div>

<div class="window" id="Settings"><div class="window-header">
  <div class="traffic"><div class="close"></div><div class="fullscreen"></div><div class="minimize"></div></div>
  <span>Settings</span>
</div><div class="window-content"><h2>Settings</h2><p>Configure macOS simulator.</p></div></div>

<div class="window" id="Ampler"><div class="window-header">
  <div class="traffic"><div class="close"></div><div class="fullscreen"></div><div class="minimize"></div></div>
  <span>Ampler Launcher</span>
</div><div class="window-content"><iframe src="https://ampler-launcher.wasmer.app/"></iframe></div></div>

<div class="window" id="Terminal"><div class="window-header">
  <div class="traffic"><div class="close"></div><div class="fullscreen"></div><div class="minimize"></div></div>
  <span>Terminal</span>
</div><div class="window-content"><iframe src="./terminal.html"></iframe></div></div>

<div class="window" id="Music"><div class="window-header">
  <div class="traffic"><div class="close"></div><div class="fullscreen"></div><div class="minimize"></div></div>
  <span>Apple Music</span>
</div><div class="window-content"><iframe src="https://freefy.app"></iframe></div></div>

<div class="window" id="Steam"><div class="window-header">
  <div class="traffic"><div class="close"></div><div class="fullscreen"></div><div class="minimize"></div></div>
  <span>Steam Library</span>
</div><div class="window-content"><iframe src="./steam.html"></iframe></div></div>

<script>
// Dragging windows
let dragTarget = null, offsetX=0, offsetY=0;

document.querySelectorAll('.window-header').forEach(header=>{
  header.addEventListener('mousedown', e=>{
    const w = header.parentElement;
    dragTarget=w;
    offsetX = e.clientX - w.offsetLeft;
    offsetY = e.clientY - w.offsetTop;
    w.style.zIndex=1000;
  });
});

document.addEventListener('mousemove', e=>{
  if(dragTarget){
    let x=e.clientX-offsetX, y=e.clientY-offsetY;
    y=Math.max(0, Math.min(y, window.innerHeight-dragTarget.offsetHeight-70));
    x=Math.max(0, Math.min(x, window.innerWidth-dragTarget.offsetWidth));
    dragTarget.style.left=x+'px';
    dragTarget.style.top=y+'px';
  }
});

document.addEventListener('mouseup', ()=>{ dragTarget=null; });

// Dock click open
const apps = {
  "Finder":"Finder",
  "Safari":"./Safari.html",
  "YouTube":"./yt.html",
  "ChatGPT":"./GPT.html",
  "Settings":"Settings",
  "Ampler":"https://ampler-launcher.wasmer.app/",
  "Terminal":"./terminal.html",
  "Music":"https://freefy.app",
  "Steam":"./steam.html"
};

document.querySelectorAll('.dock-app').forEach(app=>{
  app.addEventListener('click', ()=>{
    const id = app.dataset.app;
    const win = document.getElementById(id);
    if(win.style.display==='flex'){ return; }
    win.style.display='flex';
    win.style.width='800px'; win.style.height='500px';
    win.style.left=(window.innerWidth/2-400)+'px';
    win.style.top=(window.innerHeight/2-250)+'px';
    win.classList.add('show');
  });
});

// Traffic lights
document.querySelectorAll('.traffic .close').forEach(btn=>{
  btn.addEventListener('click', e=>{
    const win = btn.closest('.window'); win.style.display='none';
  });
});
document.querySelectorAll('.traffic .fullscreen').forEach(btn=>{
  btn.addEventListener('click', e=>{
    const win = btn.closest('.window');
    win.style.width=window.innerWidth+'px';
    win.style.height=(window.innerHeight-70)+'px';
    win.style.left=0; win.style.top=28+'px';
  });
});
document.querySelectorAll('.traffic .minimize').forEach(btn=>{
  btn.addEventListener('click', e=>{
    const win = btn.closest('.window');
    win.style.display='none';
  });
});
</script>

</body>
</html>
