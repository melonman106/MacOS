<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MacOS 26</title>
  <style>
    :root {
      --mac-blur: blur(20px);
      --window-bg: rgba(28, 28, 30, 0.85);
      --border-radius: 12px;
    }

    body, html {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: url("Macbg.jpg") center/cover no-repeat fixed;
      background-color: #1a1a1a;
    }

    .top-bar {
      height: 28px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: var(--mac-blur);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 15px;
      font-size: 13px;
      color: white;
      z-index: 10000;
      box-shadow: 0 1px 5px rgba(0,0,0,0.2);
    }

    .top-left { display: flex; align-items: center; gap: 8px; }
    #apple-icon { width: 18px; height: 18px; object-fit: contain; }

    .window {
      position: absolute;
      width: 600px;
      height: 450px;
      background: var(--window-bg);
      border-radius: var(--border-radius);
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      border: 0.5px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: var(--mac-blur);
      overflow: hidden;
      transition: opacity 0.2s, transform 0.2s;
    }

    .window.maximized {
      width: 100% !important;
      height: calc(100% - 28px) !important;
      top: 28px !important;
      left: 0 !important;
      border-radius: 0;
    }

    .window.minimized {
      transform: scale(0.8) translateY(500px);
      opacity: 0;
      pointer-events: none;
    }

    .window-header {
      height: 38px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      cursor: default;
      user-select: none;
      background: rgba(255,255,255,0.05);
      flex-shrink: 0;
    }

    .traffic-lights { display: flex; gap: 8px; width: 60px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; border: none; }
    .red    { background: #ff5f56; }
    .yellow { background: #ffbd2e; }
    .green  { background: #27c93f; }

    .window-title {
      flex: 1; text-align: center;
      color: rgba(255,255,255,0.8);
      font-size: 13px; font-weight: 500;
      margin-right: 60px;
    }

    .window-content {
      flex: 1;
      background: white;
      position: relative;
      overflow: hidden;
    }

    iframe {
      border: none; width: 100%; height: 100%;
      border-radius: 0 0 var(--border-radius) var(--border-radius);
    }

    .dock {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: var(--mac-blur);
      padding: 6px;
      border-radius: 18px;
      display: flex;
      gap: 10px;
      border: 0.5px solid rgba(255, 255, 255, 0.3);
      z-index: 10001;
    }

    .dock-icon {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s;
      position: relative;
    }
    .dock-icon img { width: 90%; height: 90%; object-fit: contain; }
    .dock-icon:hover { transform: scale(1.3) translateY(-10px); }

    .dock-icon::after {
      content: attr(title);
      position: absolute;
      bottom: 62px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: white;
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 6px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
    }
    .dock-icon:hover::after { opacity: 1; }

    .finder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 20px;
      padding: 25px;
      background: #1e1e1e;
      height: 100%;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .finder-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      padding: 10px;
      border-radius: 10px;
      transition: background 0.15s;
    }
    .finder-item:hover { background: rgba(255,255,255,0.1); }
    .finder-item img { width: 48px; height: 48px; margin-bottom: 8px; object-fit: contain; }

    .tester-shell {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100%;
      background: #1a1a1a;
      font-family: -apple-system, sans-serif;
    }
    .tester-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #111;
      border-bottom: 1px solid #333;
      flex-wrap: wrap;
    }
    .tester-toolbar span {
      font-size: 12px; font-weight: 700;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .tester-btn {
      padding: 6px 16px; border: none; border-radius: 6px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      transition: 0.2s; font-family: inherit;
    }
    .tester-btn.run   { background: #27c93f; color: #000; }
    .tester-btn.run:hover   { background: #2de047; }
    .tester-btn.clear { background: #ff5f56; color: #fff; }
    .tester-btn.clear:hover { background: #ff7b73; }
    .tester-btn.wrap  { background: #333; color: #fff; }
    .tester-btn.wrap:hover  { background: #444; }
    .tester-btn.copy  { background: #333; color: #fff; }
    .tester-btn.copy:hover  { background: #444; }

    .tester-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }
    .tester-editor-wrap {
      display: flex; flex-direction: column;
      border-right: 1px solid #333; overflow: hidden;
    }
    .tester-editor-header, .tester-preview-header {
      padding: 6px 14px;
      background: #161616;
      border-bottom: 1px solid #2a2a2a;
      font-size: 11px; color: rgba(255,255,255,0.3);
      font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .tester-editor {
      flex: 1; background: #0d0d0d; color: #e0e0e0;
      border: none; outline: none; padding: 16px;
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      font-size: 12px; line-height: 1.7; resize: none;
      box-sizing: border-box; width: 100%; tab-size: 2;
    }
    .tester-preview-wrap {
      display: flex; flex-direction: column; overflow: hidden;
    }
    .preview-status {
      font-size: 10px; padding: 2px 8px;
      border-radius: 10px; font-weight: 600;
    }
    .preview-status.ready { background: rgba(39,201,63,0.2); color: #27c93f; }
    .preview-status.empty { background: rgba(255,255,255,0.05); color: #555; }
    .tester-iframe { flex: 1; border: none; width: 100%; background: #fff; }
    .tester-statusbar {
      padding: 5px 14px; background: #111;
      border-top: 1px solid #222; font-size: 11px;
      color: rgba(255,255,255,0.3); display: flex; gap: 20px;
    }
    .char-count { font-size: 10px; color: #555; }

    /* CHAT STYLES */
    .chat-shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: #1a1a1a;
      font-family: -apple-system, sans-serif;
    }
    .chat-header {
      padding: 14px 18px;
      background: #111;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .chat-header img { width: 24px; height: 24px; }
    .chat-header span { color: white; font-weight: 600; font-size: 15px; }
    .chat-model-badge {
      margin-left: auto;
      font-size: 11px;
      color: #555;
      background: #222;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    .chat-typing {
      padding: 0 20px 8px;
      color: #666;
      font-size: 12px;
      display: none;
    }
    .chat-input-area {
      padding: 14px;
      background: #111;
      border-top: 1px solid #2a2a2a;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .chat-textarea {
      flex: 1;
      background: #222;
      border: 1px solid #444;
      border-radius: 12px;
      padding: 10px 14px;
      color: white;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      box-sizing: border-box;
      scrollbar-width: thin;
      scrollbar-color: #444 transparent;
    }
    .chat-textarea:focus { border-color: #007aff; }
    .chat-send-btn {
      width: 40px;
      height: 40px;
      background: #007aff;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
      color: white;
    }
    .chat-send-btn:hover { background: #3395ff; }
    .chat-send-btn:disabled { background: #333; cursor: not-allowed; }
    .chat-bubble-wrap {
      display: flex;
    }
    .chat-bubble-wrap.user { justify-content: flex-end; }
    .chat-bubble-wrap.assistant { justify-content: flex-start; }
    .chat-bubble {
      max-width: 75%;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .chat-bubble.user {
      background: #007aff;
      color: white;
      border-radius: 18px 18px 4px 18px;
    }
    .chat-bubble.assistant {
      background: #2a2a2a;
      color: white;
      border-radius: 18px 18px 18px 4px;
    }
    .chat-bubble.error {
      background: #3a1a1a;
      color: #ff5f56;
      border-radius: 18px 18px 18px 4px;
    }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="top-left">
    <img id="apple-icon" src="apple.png" alt="Apple">
    <strong>MacOS 26</strong>
  </div>
  <div id="clock">00:00</div>
</div>

<div id="desktop"></div>

<div class="dock">
  <div class="dock-icon" title="Finder" onclick="openFinder()">
    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b9/Finder_Icon_macOS_Tahoe.png">
  </div>
  <div class="dock-icon" title="Safari" onclick="openSafari()">
    <img src="https://cdn-icons-png.flaticon.com/128/16566/16566102.png">
  </div>
  <div class="dock-icon" title="YouTube" onclick="openYouTube()">
    <img src="https://cdn-icons-png.flaticon.com/128/1384/1384060.png">
  </div>
  <div class="dock-icon" title="Steam" onclick="openApp('Steam', './steam.html', './steam.ico')">
    <img src="./steam.ico">
  </div>
  <div class="dock-icon" title="Terminal" onclick="openApp('Terminal', 'games/terminal.html', 'https://upload.wikimedia.org/wikipedia/commons/6/68/Terminalicon3.png')">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/68/Terminalicon3.png">
  </div>
  <div class="dock-icon" title="ChatGPT" onclick="openChatGPT()">
    <img src="https://cdn-icons-png.flaticon.com/128/12222/12222560.png">
  </div>
  <div class="dock-icon" title="App Tester" onclick="openAppTester()">
    <img src="https://cdn-icons-png.flaticon.com/128/8099/8099121.png">
  </div>
</div>

<script>
let windowZ = 100;
const finderIcon = "https://upload.wikimedia.org/wikipedia/commons/b/b9/Finder_Icon_macOS_Tahoe.png";
const terminalIcon = "https://upload.wikimedia.org/wikipedia/commons/6/68/Terminalicon3.png";
const chatHistories = {};

/* ═══════════════════════════════════════
   CORE WINDOW FACTORY
═══════════════════════════════════════ */
function createWindow(title, contentHtml, iconUrl = finderIcon, w = 600, h = 450) {
    windowZ++;
    const win = document.createElement("div");
    win.className = "window";
    win.style.zIndex = windowZ;
    win.style.width  = w + "px";
    win.style.height = h + "px";
    win.style.left   = (80 + Math.random() * 80) + "px";
    win.style.top    = (50 + Math.random() * 60) + "px";

    win.innerHTML = `
      <div class="window-header">
        <div class="traffic-lights">
          <div class="dot red"></div>
          <div class="dot yellow"></div>
          <div class="dot green"></div>
        </div>
        <div class="window-title">${title}</div>
      </div>
      <div class="window-content">${contentHtml}</div>
    `;

    document.getElementById("desktop").appendChild(win);

    win.querySelector(".red").onclick    = (e) => { e.stopPropagation(); win.remove(); };
    win.querySelector(".yellow").onclick = (e) => { e.stopPropagation(); win.classList.toggle("maximized"); };
    win.querySelector(".green").onclick  = (e) => { e.stopPropagation(); win.classList.add("minimized"); };

    win.onmousedown = () => { windowZ++; win.style.zIndex = windowZ; };

    initDrag(win);
    return win;
}

function initDrag(win) {
    const header = win.querySelector(".window-header");
    header.onmousedown = (e) => {
        if (win.classList.contains('maximized')) return;
        let startX = e.clientX, startY = e.clientY;
        let startLeft = win.offsetLeft, startTop = win.offsetTop;

        function doDrag(e) {
            win.style.left = (startLeft + e.clientX - startX) + "px";
            win.style.top  = (startTop  + e.clientY - startY) + "px";
        }
        function stopDrag() {
            document.removeEventListener('mousemove', doDrag);
            document.removeEventListener('mouseup',  stopDrag);
        }
        document.addEventListener('mousemove', doDrag);
        document.addEventListener('mouseup',   stopDrag);
    };
}

const openApp = (title, url, icon, w, h) =>
    createWindow(title, `<iframe src="${url}" style="width:100%;height:100%;border:none;"></iframe>`, icon, w, h);

/* ═══════════════════════════════════════
   BUILT-IN APPS
═══════════════════════════════════════ */
function openSafari() {
    openApp('Safari', 'blob:https://asic.amrityadav.com.np/e3f490e5-d33e-4086-886e-9542b96aa49e',
        'https://cdn-icons-png.flaticon.com/128/16566/16566102.png');
}

function openYouTube() {
    openApp('YouTube', './yt.html',
        'https://cdn-icons-png.flaticon.com/128/1384/1384060.png');
}

/* ═══════════════════════════════════════
   CHATGPT APP
═══════════════════════════════════════ */
function openChatGPT() {
    const uid        = 'chat_' + Date.now();
    const messagesId = 'messages_' + uid;
    const inputId    = 'input_'    + uid;
    const typingId   = 'typing_'   + uid;
    const sendId     = 'send_'     + uid;

    chatHistories[uid] = [];

    const html = `
    <div class="chat-shell">
      <div class="chat-header">
        <img src="https://cdn-icons-png.flaticon.com/128/12222/12222560.png">
        <span>ChatGPT</span>
        <span class="chat-model-badge">GPT-4o</span>
      </div>

      <div class="chat-messages" id="${messagesId}">
        <div class="chat-bubble-wrap assistant">
          <div class="chat-bubble assistant">👋 Hello! How can I help you today?</div>
        </div>
      </div>

      <div class="chat-typing" id="${typingId}">● ChatGPT is typing...</div>

      <div class="chat-input-area">
        <textarea
          class="chat-textarea"
          id="${inputId}"
          placeholder="Message ChatGPT… (Enter to send, Shift+Enter for new line)"
          rows="1"
          onkeydown="handleChatKey(event,'${uid}','${messagesId}','${inputId}','${typingId}','${sendId}')"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';"
        ></textarea>
        <button
          class="chat-send-btn"
          id="${sendId}"
          onclick="sendChatMessage('${uid}','${messagesId}','${inputId}','${typingId}','${sendId}')"
        >➤</button>
      </div>
    </div>`;

    createWindow("ChatGPT", html,
        'https://cdn-icons-png.flaticon.com/128/12222/12222560.png', 680, 520);
}

function handleChatKey(e, uid, messagesId, inputId, typingId, sendId) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendChatMessage(uid, messagesId, inputId, typingId, sendId);
    }
}

async function sendChatMessage(uid, messagesId, inputId, typingId, sendId) {
    const inputEl    = document.getElementById(inputId);
    const messagesEl = document.getElementById(messagesId);
    const typingEl   = document.getElementById(typingId);
    const sendBtn    = document.getElementById(sendId);
    const userText   = inputEl ? inputEl.value.trim() : '';

    if (!userText) return;

    // Disable send while processing
    if (sendBtn) sendBtn.disabled = true;

    // Clear input
    inputEl.value = '';
    inputEl.style.height = 'auto';

    // Add user message to UI
    appendChatBubble(messagesEl, userText, 'user');

    // Add to history
    if (!chatHistories[uid]) chatHistories[uid] = [];
    chatHistories[uid].push({ role: 'user', content: userText });

    // Show typing indicator
    if (typingEl) typingEl.style.display = 'block';
    if (messagesEl) messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
        const response = await fetch('https://api.g4f.ai/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'g4f_u_mmskjq_91c26042dd78fb1fccd3c30b4e2bff3be97dbde528b9e9c7_b614fe43'
            },
            body: JSON.stringify({
                model: 'gpt-4o',
                messages: chatHistories[uid],
                stream: false
            })
        });

        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`HTTP ${response.status} — ${errText}`);
        }

        const data  = await response.json();
        const reply = data.choices?.[0]?.message?.content || '(No response)';

        chatHistories[uid].push({ role: 'assistant', content: reply });

        if (typingEl) typingEl.style.display = 'none';
        appendChatBubble(messagesEl, reply, 'assistant');

    } catch (err) {
        if (typingEl) typingEl.style.display = 'none';
        appendChatBubble(messagesEl,
            `⚠️ Error: ${err.message}`, 'error');
        console.error('ChatGPT error:', err);
    }

    if (sendBtn) sendBtn.disabled = false;
    if (inputEl) inputEl.focus();
    if (messagesEl) messagesEl.scrollTop = messagesEl.scrollHeight;
}

function appendChatBubble(container, text, role) {
    if (!container) return;
    const wrap   = document.createElement('div');
    wrap.className = `chat-bubble-wrap ${role}`;
    const bubble = document.createElement('div');
    bubble.className = `chat-bubble ${role}`;
    bubble.textContent = text;
    wrap.appendChild(bubble);
    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;
}

/* ═══════════════════════════════════════
   FINDER
═══════════════════════════════════════ */
function openFinder() {
    const html = `
    <div class="finder-grid">
        <div class="finder-item"
            onclick="openApp('Terminal','games/terminal.html','${terminalIcon}')">
            <img src="${terminalIcon}">Terminal
        </div>
        <div class="finder-item"
            onclick="openApp('Steam','./steam.html','./steam.ico')">
            <img src="./steam.ico">Steam
        </div>
        <div class="finder-item" onclick="openSafari()">
            <img src="https://cdn-icons-png.flaticon.com/128/16566/16566102.png">Safari
        </div>
        <div class="finder-item" onclick="openYouTube()">
            <img src="https://cdn-icons-png.flaticon.com/128/1384/1384060.png">YouTube
        </div>
        <div class="finder-item" onclick="openChatGPT()">
            <img src="https://cdn-icons-png.flaticon.com/128/12222/12222560.png">ChatGPT
        </div>
        <div class="finder-item" onclick="openAppTester()">
            <img src="https://cdn-icons-png.flaticon.com/128/8099/8099121.png">App Tester
        </div>
    </div>`;
    createWindow("Finder", html, finderIcon);
}

/* ═══════════════════════════════════════
   APP TESTER
═══════════════════════════════════════ */
function openAppTester() {
    const uid      = 'tester_' + Date.now();
    const iframeId = 'preview_' + uid;
    const editorId = 'editor_'  + uid;
    const statusId = 'status_'  + uid;
    const charsId  = 'chars_'   + uid;
    const linesId  = 'lines_'   + uid;

    const starter = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, sans-serif;
      background: #1a1a1a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 12px;
    }
    h1 { font-size: 28px; margin: 0; }
    p  { color: #888; margin: 0; font-size: 14px; }
    button {
      padding: 10px 24px;
      background: #007aff;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #3395ff; }
  </style>
</head>
<body>
  <h1>🚀 App Tester</h1>
  <p>Edit the code on the left, then click Run.</p>
  <button onclick="this.textContent='Hello!'">Click Me</button>
</body>
</html>`;

    const html = `
    <div class="tester-shell">
      <div class="tester-toolbar">
        <span>⚗️ App Tester</span>
        <button class="tester-btn run"
            onclick="runTester('${iframeId}','${editorId}','${statusId}')">▶ Run</button>
        <button class="tester-btn wrap"
            onclick="toggleWrap('${editorId}',this)">↩ Wrap</button>
        <button class="tester-btn copy"
            onclick="copyCode('${editorId}')">⎘ Copy</button>
        <button class="tester-btn clear"
            onclick="clearTester('${editorId}','${iframeId}','${statusId}')">✕ Clear</button>
      </div>
      <div class="tester-body">
        <div class="tester-editor-wrap">
          <div class="tester-editor-header">
            <span>📄 HTML / CSS / JS</span>
            <span class="char-count" id="${charsId}">0 chars</span>
          </div>
          <textarea class="tester-editor" id="${editorId}" spellcheck="false"
            placeholder="Paste or write your HTML here…"
            oninput="updateTesterStats('${editorId}','${charsId}','${linesId}')"
            onkeydown="handleTab(event)"
          >${escapeHtml(starter)}</textarea>
        </div>
        <div class="tester-preview-wrap">
          <div class="tester-preview-header">
            <span>👁 Preview</span>
            <span class="preview-status empty" id="${statusId}">Empty</span>
          </div>
          <iframe class="tester-iframe" id="${iframeId}"
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
        </div>
      </div>
      <div class="tester-statusbar">
        <span id="${linesId}">Lines: 0</span>
        <span>Ready — press ▶ Run to preview</span>
      </div>
    </div>`;

    const win = createWindow("App Tester", html,
        'https://cdn-icons-png.flaticon.com/128/8099/8099121.png', 920, 590);

    setTimeout(() => {
        updateTesterStats(editorId, charsId, linesId);
        runTester(iframeId, editorId, statusId);
    }, 150);
}

function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function runTester(iframeId, editorId, statusId) {
    const code   = document.getElementById(editorId).value;
    const iframe = document.getElementById(iframeId);
    const status = document.getElementById(statusId);
    if (!code.trim()) {
        status.textContent = 'Empty';
        status.className   = 'preview-status empty';
        return;
    }
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open(); doc.write(code); doc.close();
    status.textContent = '● Running';
    status.className   = 'preview-status ready';
}

function clearTester(editorId, iframeId, statusId) {
    document.getElementById(editorId).value = '';
    const iframe = document.getElementById(iframeId);
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open(); doc.write(''); doc.close();
    document.getElementById(statusId).textContent = 'Empty';
    document.getElementById(statusId).className   = 'preview-status empty';
}

function toggleWrap(editorId, btn) {
    const ta = document.getElementById(editorId);
    const on = ta.style.whiteSpace === 'pre-wrap';
    ta.style.whiteSpace   = on ? 'pre'    : 'pre-wrap';
    ta.style.overflowWrap = on ? 'normal' : 'break-word';
    btn.style.background  = on ? '#333'   : '#007aff';
}

function copyCode(editorId) {
    const val = document.getElementById(editorId).value;
    navigator.clipboard.writeText(val).then(() => {
        const btn = event.target;
        const orig = btn.textContent;
        btn.textContent = '✓ Copied!';
        btn.style.background = '#27c93f';
        setTimeout(() => { btn.textContent = orig; btn.style.background = '#333'; }, 1500);
    });
}

function updateTesterStats(editorId, charsId, linesId) {
    const val = document.getElementById(editorId).value;
    const el  = document.getElementById(charsId);
    const le  = document.getElementById(linesId);
    if (el) el.textContent = val.length.toLocaleString() + ' chars';
    if (le) le.textContent = 'Lines: ' + val.split('\n').length;
}

function handleTab(e) {
    if (e.key === 'Tab') {
        e.preventDefault();
        const ta = e.target;
        const s  = ta.selectionStart;
        ta.value = ta.value.substring(0, s) + '  ' + ta.value.substring(ta.selectionEnd);
        ta.selectionStart = ta.selectionEnd = s + 2;
    }
}

/* ═══════════════════════════════════════
   MESSAGE LISTENER
═══════════════════════════════════════ */
window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'openWindow') {
        openApp(
            e.data.title,
            e.data.url,
            e.data.icon || finderIcon,
            800,
            560
        );
    }
});

/* ═══════════════════════════════════════
   CLOCK
═══════════════════════════════════════ */
function updateTime() {
    const now = new Date();
    document.getElementById("clock").innerText =
        now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
setInterval(updateTime, 1000);
updateTime();

window.onload = () => { openFinder(); };

document.addEventListener('keydown', (e) => {
    if (e.key === "Escape")
        document.querySelectorAll('.minimized')
            .forEach(w => w.classList.remove('minimized'));
});
</script>
</body>
</html>
