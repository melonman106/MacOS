<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>macOS 26 Words</title>
<link rel="icon" href="./apple.png">
<style>
:root {
  --dock-height: 80px;
  --dock-width: 800px;
  --top-nav-height: 30px;
}

body, html {
  margin:0; padding:0; height:100%; width:100%;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  background: url('Macbg.jpg') no-repeat center/cover;
  overflow: hidden;
}

#top-nav {
  position: fixed; top:0; left:0; right:0;
  height: var(--top-nav-height);
  background: rgba(20,20,20,0.9);
  z-index: 1000;
  display:flex; align-items:center; padding:0 10px;
  color:white; font-weight:600;
}

#dock {
  position: fixed; bottom:0; left:50%; transform:translateX(-50%);
  height: var(--dock-height); width: var(--dock-width);
  background: rgba(20,20,20,0.85); border-radius:20px;
  display:flex; align-items:center; justify-content:center; gap:20px;
  padding:0 10px; backdrop-filter:blur(20px); z-index:1000;
}

.dock-app {
  width:60px; height:60px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition: transform 0.2s;
}

.dock-app:hover { transform: scale(1.25); }

#finder {
  position: absolute; top: var(--top-nav-height); left: 0;
  right:0; bottom: var(--dock-height);
  background: rgba(30,30,30,0.4); backdrop-filter: blur(20px);
  display:grid; grid-template-columns: repeat(auto-fill, minmax(80px,1fr));
  grid-auto-rows: 100px; gap:15px; padding:20px;
  overflow-y: auto; box-sizing:border-box;
}

.finder-app {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:pointer; transition: transform 0.15s;
  text-align:center; font-size:12px; color:white;
}

.finder-app:hover { transform: scale(1.15); }

.window {
  position:absolute; background:#1c1c1e; border-radius:12px; border:1px solid rgba(255,255,255,0.1);
  z-index:500; display:none; overflow:hidden;
  resize:both; min-width:200px; min-height:150px;
}

.window-header {
  height:25px; background: rgba(50,50,50,0.85); display:flex; align-items:center; padding:0 5px;
  cursor: move; color:white; font-size:12px;
}

.window-close { margin-left:auto; cursor:pointer; font-weight:bold; }

iframe.app-content {
  width:100%; height:calc(100% - 25px); border:none;
}

/* Toast */
.toast { position:fixed; bottom: var(--dock-height); left:50%;
  transform:translateX(-50%) translateY(50px);
  background:rgba(0,0,0,0.85); color:#fff; padding:10px 25px; border-radius:20px;
  opacity:0; pointer-events:none; transition: transform 0.35s, opacity 0.3s; z-index:9999;
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
</style>
</head>
<body>

<div id="top-nav"> macOS 26 Words</div>

<div id="finder">
  <div class="finder-app" data-app="Safari"><img src="./images/Safari.png" style="width:50px;height:50px"><br>Safari</div>
  <div class="finder-app" data-app="YouTube"><img src="./images/YouTube.png" style="width:50px;height:50px"><br>YouTube</div>
  <div class="finder-app" data-app="ChatGPT"><img src="./images/ChatGPT.png" style="width:50px;height:50px"><br>ChatGPT</div>
  <div class="finder-app" data-app="AppleMusic"><img src="./images/AppleMusic.png" style="width:50px;height:50px"><br>Music</div>
  <div class="finder-app" data-app="Terminal"><img src="./images/Terminal.png" style="width:50px;height:50px"><br>Terminal</div>
  <div class="finder-app" data-app="Steam"><img src="./images/Steam.png" style="width:50px;height:50px"><br>Steam</div>
  <div class="finder-app" data-app="AmplerLauncher"><img src="./images/Ampler.png" style="width:50px;height:50px"><br>Ampler</div>
  <div class="finder-app" data-app="Settings"><img src="./images/Settings.png" style="width:50px;height:50px"><br>Settings</div>
</div>

<div id="dock">
  <div class="dock-app" data-app="Finder"><img src="./images/Finder.png" style="width:40px;height:40px"></div>
  <div class="dock-app" data-app="Safari"><img src="./images/Safari.png" style="width:40px;height:40px"></div>
  <div class="dock-app" data-app="YouTube"><img src="./images/YouTube.png" style="width:40px;height:40px"></div>
  <div class="dock-app" data-app="ChatGPT"><img src="./images/ChatGPT.png" style="width:40px;height:40px"></div>
  <div class="dock-app" data-app="AppleMusic"><img src="./images/AppleMusic.png" style="width:40px;height:40px"></div>
  <div class="dock-app" data-app="Terminal"><img src="./images/Terminal.png" style="width:40px;height:40px"></div>
  <div class="dock-app" data-app="Steam"><img src="./images/Steam.png" style="width:40px;height:40px"></div>
  <div class="dock-app" data-app="AmplerLauncher"><img src="./images/Ampler.png" style="width:40px;height:40px"></div>
  <div class="dock-app" data-app="Settings"><img src="./images/Settings.png" style="width:40px;height:40px"></div>
</div>

<!-- App Windows -->
<div id="windows-container"></div>

<div class="toast" id="toast"></div>

<script>
const apps = {
  Safari: './Safari.html',
  YouTube: './YouTube.html',
  ChatGPT: './gpt.html',
  AppleMusic: 'https://freefy.app',
  Terminal: './Terminal.html',
  Steam: './Steam.html',
  AmplerLauncher: 'https://ampler-launcher.wasmer.app/',
  Settings: './Settings.html'
};

function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function openApp(name,url,width=800,height=500){
  const container=document.getElementById('windows-container');
  const win=document.createElement('div');
  win.className='window'; win.style.width=width+'px'; win.style.height=height+'px';
  win.style.left=((window.innerWidth-width)/2)+'px';
  win.style.top=((window.innerHeight-height-parseInt(getComputedStyle(document.documentElement).getPropertyValue('--dock-height')))/2)+'px';
  win.innerHTML=`<div class="window-header">${name} <span class="window-close" onclick="this.parentElement.parentElement.remove()">✕</span></div>
  <iframe class="app-content" src="${url}"></iframe>`;
  container.appendChild(win);
  win.style.display='block';
  showToast(`🚀 Launching ${name}`);
}

// Finder app clicks
document.querySelectorAll('.finder-app, .dock-app').forEach(app=>{
  app.addEventListener('click',()=>openApp(app.dataset.app, apps[app.dataset.app]));
});
</script>

</body>
</html>
